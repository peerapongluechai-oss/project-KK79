        const generateSmartSchedule = (availObj, longDay) => {
            let newSched = { 0:'rest', 1:'rest', 2:'rest', 3:'rest', 4:'rest', 5:'rest', 6:'rest' };
            let trainingDays = [];
            Object.keys(availObj).forEach(k => { if (availObj[k]) trainingDays.push(Number(k)); });
            if (trainingDays.length === 0) return newSched;

            if (trainingDays.includes(Number(longDay))) { newSched[longDay] = 'long'; } 
            else { newSched[trainingDays[0]] = 'long'; longDay = trainingDays[0]; }

            if (trainingDays.length > 1) {
                let speedDay = -1, maxDist = -1;
                trainingDays.forEach(day => {
                    if (day !== Number(longDay)) {
                        let dist = Math.abs(day - Number(longDay));
                        if (dist > 3) dist = 7 - dist; 
                        if (dist > maxDist) { maxDist = dist; speedDay = day; }
                    }
                });
                if (speedDay !== -1) newSched[speedDay] = 'speed';
            }
            trainingDays.forEach(day => { if (newSched[day] === 'rest') newSched[day] = 'easy'; });
            return newSched;
        };

            const hrs = Math.floor(s/3600), mins = Math.floor((s%3600)/60), secs = Math.floor(s%60);
            return { s, str: `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}` };
        };

            const hrr = maxHr - (rhr||60);
            return `${Math.round(hrr*min)+Number(rhr||60)}-${Math.round(hrr*max)+Number(rhr||60)} bpm`;

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        const errMsg = errData?.error?.message || `HTTP error! status: ${response.status}`;
                        throw new Error(errMsg);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        const TabTracker = ({ score, daily, updateDaily, clearActivities, cfg, inDist, setInDist, inPace, setInPace, inHr, setInHr, inCadence, setInCadence, inElevation, setInElevation, inDuration, setInDuration, inAct, setInAct, saveRun, targetWater, isHotWeather, setIsHotWeather, lang, logDate, setLogDate }) => {

            const [isHealthScanning, setIsHealthScanning] = useState(false);
            const [healthScanError, setHealthScanError] = useState('');
            
            const [sleepHrs, setSleepHrs] = useState('');
            const [sleepMins, setSleepMins] = useState('');
            const [hrvInput, setHrvInput] = useState('');

            const isRunOrTrail = inAct === 'Run' || inAct === 'Trail';

            const p1 = "AQ.Ab8RN6Jj";
            const p2 = "-wpm6y7RCka";
            const p3 = "hetHf7nVPq2w";
            const p4 = "_3FFjMIy_ULW";
            const p5 = "zxJv6Yw";
            const secretKey = p1 + p2 + p3 + p4 + p5;

            const getBestModel = async () => {
                let targetModel = 'gemini-1.5-flash'; 
                try {
                    const listRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${secretKey}`);
                    const listData = await listRes.json();
                    if (listData.models) {
                        const valid = listData.models.filter(m => m.supportedGenerationMethods?.includes('generateContent'));
                        const best = valid.find(m => m.name.includes('gemini-1.5-flash')) || valid.find(m => m.name.includes('gemini-2.5-flash')) || valid[0];
                        if (best) targetModel = best.name.replace('models/', '');
                    }
                } catch(err) { console.warn("Auto-discover failed:", err); }
                return targetModel;
            };

            const handleManualReadiness = () => {
                let sMins = (parseInt(sleepHrs) || 0) * 60 + (parseInt(sleepMins) || 0);
                let hrvVal = parseInt(hrvInput) || 0;
                
                if (sMins === 0 && hrvVal === 0) return;

                if(sMins === 0) sMins = 420; 
                if(hrvVal === 0) hrvVal = 50;

                const sleepScore = Math.min((sMins / 420) * 50, 50);
                const hrvScore = Math.min((hrvVal / 60) * 50, 50);
                let rScore = Math.round(sleepScore + hrvScore);
                if (rScore < 10) rScore = 10;

                updateDaily({
                    rSleep: sMins,
                    rHrv: hrvVal,
                    rReadinessScore: rScore,
                    rReadinessChecked: true
                });
                
                if (rScore < 60 || sMins < 360) {
                    alert(lang === 'th' ? `⚠️ โค้ช AI สังเกตเห็นว่าร่างกายคุณต้องการการพักผ่อน (อาจจะนอนน้อยหรือความพร้อมต่ำ) ตารางวิ่งหนักวันนี้จะถูกปรับเป็น Recovery ให้อัตโนมัติครับ!` : `⚠️ Coach adjusted today to Recovery due to low readiness!`);
                }
            };

            const handleHealthScan = async (e) => {
                const file = e.target.files[0];
                if(!file) return;

                setIsHealthScanning(true);
                setHealthScanError('กำลังเตรียมระบบวิเคราะห์สัญญาณชีพ...');

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        const targetModel = await getBestModel();
                        setHealthScanError(`กำลังวิเคราะห์สัญญาณชีพ...`);

                        const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${secretKey}`;
                        
                        const promptText = "Extract Sleep duration and HRV (Heart Rate Variability) from this health app screenshot. Return ONLY a valid JSON object without markdown. Keys needed: 'sleepMinutes' (number, total sleep in minutes. For example, if the image shows 6:42, it means 6 hours and 42 minutes, which is (6*60)+42 = 402 minutes.), 'hrv' (number, HRV value in ms). If not found, return 0.";

                        const payload = {
                            contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: { mimeType: file.type, data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { sleepMinutes: { type: "NUMBER" }, hrv: { type: "NUMBER" } } } }
                        };

                        const resultRes = await fetchWithRetry(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

                        const text = resultRes.candidates?.[0]?.content?.parts?.[0]?.text;
                        if(text) {
                            const cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const data = JSON.parse(cleanText);
                            
                            let sMins = data.sleepMinutes || 0;
                            let hrvVal = data.hrv || 0;
                            if(sMins === 0) sMins = 360; 
                            if(hrvVal === 0) hrvVal = 40;

                            const sleepScore = Math.min((sMins / 420) * 50, 50);
                            const hrvScore = Math.min((hrvVal / 60) * 50, 50);
                            let rScore = Math.round(sleepScore + hrvScore);
                            if (rScore < 10) rScore = 10;

                            updateDaily({
                                rSleep: sMins,
                                rHrv: hrvVal,
                                rReadinessScore: rScore,
                                rReadinessChecked: true
                            });
                            
                            if (rScore < 60 || sMins < 360) {
                                alert(lang === 'th' ? `⚠️ โค้ช AI สังเกตเห็นว่าร่างกายคุณต้องการการพักผ่อน (อาจจะนอนน้อยหรือความพร้อมต่ำ) ตารางวิ่งหนักวันนี้จะถูกปรับเป็น Recovery ให้อัตโนมัติครับ!` : `⚠️ Coach adjusted today to Recovery due to low readiness!`);
                            }

                            setHealthScanError(''); 
                        } else {
                            setHealthScanError("ไม่พบข้อมูลในรูปภาพนี้ครับ");
                        }
                    } catch (err) {
                        setHealthScanError("AI สแกนไม่ผ่าน: " + err.message);
                    } finally {
                        setIsHealthScanning(false);
                    }
                };
            };

            const handleScanImage = async (e) => {
                const file = e.target.files[0];
                if(!file) return;

                setIsScanning(true);
                setScanError('กำลังเตรียมระบบ AI Vision...');

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    try {
                        const base64Data = reader.result.split(',')[1];
                        const targetModel = await getBestModel();
                        setScanError(`กำลังวิเคราะห์ภาพด้วยรุ่น: ${targetModel} ...`);

                        const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${secretKey}`;
                        
                        const promptText = "Extract workout data from this fitness app screenshot (e.g., Zepp, Garmin, Strava). The UI is likely in Thai. Map Thai words correctly (e.g., 'ระยะทาง' = distance, 'ฝีเท้าเฉลี่ย' = pace, 'อัตราการเต้นหัวใจ' = hr, 'รอบขา' or 'ก้าว/นาที' or 'spm' = cadence, 'เวลา' or 'duration' = duration, 'ความชัน' or 'elevation' = elevation). " +
                                           "Return ONLY a valid JSON object without markdown. Keys needed: 'distance' (number, MUST be in kilometers), " +
                                           "'pace' (string, average pace MM:SS), 'hr' (number, average heart rate bpm), 'cadence' (number, average spm), " +
                                           "'duration' (number in minutes, e.g. 1h 30m = 90), 'elevation' (number in meters), " +
                                           "'type' (string: strictly guess from 'Run', 'Trail', 'Swim', 'Bike', or 'Other' based on context like การวิ่งเทรล, ว่ายน้ำ). If unable to find a value, leave it empty.";

                        const payload = {
                            contents: [{
                                role: "user",
                                parts: [
                                    { text: promptText },
                                    { inlineData: { mimeType: file.type, data: base64Data } }
                                ]
                            }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        distance: { type: "NUMBER" },
                                        pace: { type: "STRING" },
                                        hr: { type: "NUMBER" },
                                        cadence: { type: "NUMBER" },
                                        duration: { type: "NUMBER" },
                                        elevation: { type: "NUMBER" },
                                        type: { type: "STRING" }
                                    }
                                }
                            }
                        };

                        const resultRes = await fetchWithRetry(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const text = resultRes.candidates?.[0]?.content?.parts?.[0]?.text;
                        if(text) {
                            const cleanText = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                            const data = JSON.parse(cleanText);
                            if(data.distance) setInDist(data.distance.toString());
                            if(data.pace) setInPace(data.pace.toString());
                            if(data.hr) setInHr(data.hr.toString());
                            if(data.cadence) setInCadence(data.cadence.toString());
                            if(data.duration) setInDuration(data.duration.toString());
                            if(data.elevation) setInElevation(data.elevation.toString());
                            if(data.type) setInAct(data.type.toString());
                            setScanError(''); 
                        } else {
                            setScanError("ไม่พบข้อมูลในรูปภาพนี้ครับ");
                        }
                    } catch (err) {
                        setScanError("AI สแกนไม่ผ่าน: " + err.message);
                    } finally {
                        setIsScanning(false);
                    }
                };
            };

            const displayActivities = daily.activities?.length > 0 ? daily.activities : (daily.rLog && daily.rDist ? [{
                id: 'legacy', type: daily.rType, dist: daily.rDist, pace: daily.rPace, hr: daily.rHr, cadence: daily.rCadence, elevation: daily.rElevation, duration: daily.rDuration, aiFeedback: daily.aiFeedback, perfCondition: daily.perfCondition, tss: daily.tss
            }] : []);

            return (
                <div className="space-y-5">
                    <div className="flex justify-between items-center bg-[#18181b] p-4 md:p-5 rounded-xl border border-zinc-700 shadow-md">
                        <span className="font-black text-xs md:text-sm text-cyan-400 uppercase tracking-widest">{t.logDate}</span>
                        <input 
                            type="date" 
                            value={logDate}
                            max={getLocalDateStr(new Date())}
                            onChange={(e) => setLogDate(e.target.value)}
                            className="bg-black text-white font-bold text-xs md:text-sm p-2 rounded-lg border border-cyan-900 outline-none focus:border-[#bef264]"
                        />
                    </div>

                    {cfg.coachLogic && (
                        <div className="bg-[#18181b] p-4 rounded-xl border border-zinc-700 text-xs font-medium text-zinc-400">
                            {cfg.coachLogic}
                        </div>
                    )}

                    <section className="suunto-card p-6 border-l-4 border-l-purple-500 bg-gradient-to-br from-[#121212] to-purple-900/10">
                        <h3 className="font-black text-sm uppercase text-purple-400 tracking-widest flex items-center gap-2 mb-4"><span>🫀</span> {t.morningCheckin}</h3>
                        {!daily.rReadinessChecked ? (
                            <div className="space-y-3">
                                <label className={`w-full border ${isHealthScanning ? 'bg-purple-900/30 border-purple-800 text-purple-400' : 'bg-[#18181b] border-purple-800 text-purple-300 hover:bg-purple-900/20'} p-4 rounded-xl text-center font-bold text-xs flex justify-center items-center gap-2 cursor-pointer active:scale-95 transition-all`}>
                                    {isHealthScanning ? <span className="animate-pulse">🔄 กำลังวิเคราะห์สัญญาณชีพ...</span> : <>📸 {t.scanHealth}<input type="file" accept="image/*" className="hidden" onChange={handleHealthScan} /></>}
                                </label>
                                
                                <div className="flex items-center gap-2 my-2">
                                    <div className="h-px bg-purple-900/50 flex-1"></div>
                                    <span className="text-[10px] text-purple-400 font-bold uppercase">{t.manualInput}</span>
                                    <div className="h-px bg-purple-900/50 flex-1"></div>
                                </div>

                                <div className="grid grid-cols-3 gap-2">
                                    <input type="number" value={sleepHrs} onChange={e=>setSleepHrs(e.target.value)} className="bg-black p-3 rounded-xl border border-purple-900/50 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-purple-500" placeholder={t.sleepHrs}/>
                                    <input type="number" value={sleepMins} onChange={e=>setSleepMins(e.target.value)} className="bg-black p-3 rounded-xl border border-purple-900/50 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-purple-500" placeholder={t.sleepMins}/>
                                    <input type="number" value={hrvInput} onChange={e=>setHrvInput(e.target.value)} className="bg-black p-3 rounded-xl border border-purple-900/50 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-purple-500" placeholder={t.hrvVal}/>
                                </div>
                                <button onClick={handleManualReadiness} disabled={!sleepHrs && !sleepMins && !hrvInput} className="w-full bg-purple-600/80 hover:bg-purple-600 text-white py-4 rounded-xl uppercase tracking-widest text-xs font-black disabled:opacity-30 transition-all active:scale-95">{t.calcReadiness}</button>
                                {healthScanError && <p className="text-red-400 text-[10px] mt-2 font-bold text-center">{healthScanError}</p>}
                            </div>
                        ) : (
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-xs text-zinc-400 font-bold uppercase">Sleep: {Math.floor(daily.rSleep/60)}h {daily.rSleep%60}m | HRV: {daily.rHrv}ms</p>
                                    <p className={`text-xl font-black italic mt-1 ${daily.rReadinessScore >= 70 ? 'text-lime-400' : daily.rReadinessScore >= 50 ? 'text-yellow-400' : 'text-red-500'}`}>{t.readiness}: {daily.rReadinessScore}%</p>
                                </div>
                                <button onClick={()=>updateDaily({rReadinessChecked: false})} className="text-[10px] text-zinc-500 hover:text-white uppercase font-bold underline">RESET</button>
                            </div>
                        )}
                    </section>

                    <section className={`p-6 suunto-card flex items-center justify-between border-l-4 transition-colors ${score===100 ? 'border-l-[#bef264] bg-[#bef264]/5' : 'border-l-zinc-700'}`}>
                        <div><h2 className="text-2xl font-black uppercase text-white">{t.score}</h2><p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-1">{t.dailyObj}</p></div>
                        <div className={`text-6xl font-black italic ${score===100 ? 'suunto-accent' : 'text-zinc-300'}`}>{score}%</div>
                    </section>
                    
                    <section className="suunto-card p-6">
                        <h3 className="font-black text-sm uppercase text-zinc-300 mb-5 tracking-widest flex items-center gap-2"><span>🍏</span> {t.nutrition}</h3>
                        <div className="grid grid-cols-2 gap-4">
                            {[ {k:'b',l:t.breakfast}, {k:'l',l:t.lunch}, {k:'s',l:t.snack}, {k:'d',l:t.dinner} ].map(m => (
                                <button key={m.k} onClick={()=>updateDaily({[m.k]: !daily[m.k]})} className={`p-5 rounded-xl text-sm font-bold uppercase transition-all border ${daily[m.k] ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#18181b] text-zinc-300 border-zinc-700 hover:bg-zinc-800'}`}>{m.l}</button>
                            ))}
                        </div>
                    </section>
                    
                    <section className="suunto-card p-6 flex items-center justify-between">
                        <div><h3 className="font-black text-sm uppercase text-cyan-500 tracking-widest flex items-center gap-2"><span>💧</span> {t.hydration}</h3><p className="text-xs text-zinc-400 font-bold uppercase mt-2">Target: {targetWater} {t.glasses}</p></div>
                        <div className="flex items-center gap-4">
                            <button onClick={()=>updateDaily({w: Math.max(0, daily.w-1)})} className="w-14 h-14 bg-[#18181b] rounded-xl font-black text-3xl text-zinc-400 border border-zinc-700 active:scale-95">-</button>
                            <span className="text-4xl font-black text-white w-10 text-center italic">{daily.w}</span>
                            <button onClick={()=>updateDaily({w: daily.w+1})} className="w-14 h-14 bg-cyan-600/20 text-cyan-400 border border-cyan-800 rounded-xl font-black text-3xl active:scale-95 hover:bg-cyan-600/40">+</button>
                        </div>
                    </section>
                    
                    <section className="suunto-card p-6">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-black text-base uppercase suunto-accent tracking-widest flex-1">🏃‍♂️ {cfg.name}</h3>
                            <button onClick={() => setIsHotWeather(!isHotWeather)} className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all flex items-center gap-1.5 border ${isHotWeather ? 'bg-orange-500/20 text-orange-400 border-orange-500/50 shadow-[0_0_10px_rgba(249,115,22,0.2)]' : 'bg-[#18181b] text-zinc-500 border-zinc-700 hover:text-zinc-300'}`}>
                                <span>☀️</span> {isHotWeather ? t.hotModeOn : t.hotModeOff}
                            </button>
                        </div>
                        <p className="text-base text-zinc-300 mb-6 leading-relaxed font-medium">{cfg.desc}</p>
                        <div className="space-y-4 mb-8">
                            {cfg.ex.map((ex, i) => (
                                <div key={i} onClick={()=>{let nx=[...(daily.ex||[false,false,false])]; nx[i]=!nx[i]; updateDaily({ex: nx});}} className={`p-5 rounded-xl border flex items-center gap-4 cursor-pointer transition-all ${daily.ex?.[i] ? 'bg-[#bef264]/10 border-[#bef264] suunto-accent' : 'bg-[#18181b] border-zinc-700 text-zinc-300 hover:border-zinc-500'}`}>
                                    <div className={`w-6 h-6 rounded flex items-center justify-center shrink-0 ${daily.ex?.[i] ? 'bg-[#bef264] text-black' : 'border-2 border-zinc-500'}`}>{daily.ex?.[i] && <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}</div>
                                    <span className="font-bold text-base tracking-wide">{ex}</span>
                                </div>
                            ))}
                        </div>
                        
                        {displayActivities.length > 0 && (
                            <div className="bg-[#18181b] p-6 rounded-xl border border-zinc-700 mb-6">
                                <div className="flex justify-between items-start mb-4">
                                    <p className="suunto-accent font-black text-sm uppercase tracking-widest">{t.activityLogged} ({displayActivities.length})</p>
                                    <button onClick={clearActivities} className="text-xs text-red-400 uppercase font-bold hover:text-red-300 underline">{t.clearLog}</button>
                                </div>
                                
                                <div className="space-y-4">
                                    {displayActivities.map((act, idx) => (
                                        <div key={act.id || idx} className="bg-black p-4 rounded-xl border border-zinc-800">
                                            <div className={`grid ${act.type === 'Run' || act.type === 'Trail' ? 'grid-cols-4 md:grid-cols-6' : 'grid-cols-3 md:grid-cols-4'} text-center gap-2 mb-4`}>
                                                <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">TYPE</p><p className="text-white font-black text-sm md:text-lg italic">{act.type === 'Run' ? '🏃‍♂️' : act.type === 'Trail' ? '⛰️' : act.type === 'Swim' ? '🏊‍♂️' : act.type === 'Bike' ? '🚴‍♂️' : '🏋️‍♂️'}</p></div>
                                                {(act.type === 'Run' || act.type === 'Trail' || act.dist) && <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">DIST</p><p className="text-white font-black text-sm md:text-lg italic">{act.dist || '-'} <span className="text-[9px] font-normal text-zinc-500">km</span></p></div>}
                                                {(act.type === 'Run' || act.type === 'Trail') && <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">PACE</p><p className="text-white font-black text-sm md:text-lg italic">{act.pace || '-'}</p></div>}
                                                {(!['Run', 'Trail'].includes(act.type)) && <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">MINS</p><p className="text-white font-black text-sm md:text-lg italic">{act.duration || '-'}</p></div>}
                                                {(act.type === 'Run' || act.type === 'Trail') && <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">ELEV</p><p className="text-white font-black text-sm md:text-lg italic text-cyan-400">{act.elevation || '-'}</p></div>}
                                                <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">HR</p><p className="text-white font-black text-sm md:text-lg italic text-red-400">{act.hr || '-'}</p></div>
                                                {(act.type === 'Run' || act.type === 'Trail') && <div><p className="text-[10px] text-zinc-500 font-bold uppercase mb-2">SPM</p><p className="text-white font-black text-sm md:text-lg italic text-orange-400">{act.cadence || '-'}</p></div>}
                                            </div>
                                            <p className="text-sm font-bold text-zinc-300 leading-relaxed">{act.aiFeedback}</p>
                                            {act.perfCondition && <span className="text-[10px] font-black text-black uppercase bg-[#bef264] px-2 py-1 rounded-lg mt-3 inline-block">{act.perfCondition}</span>}
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 border-t border-zinc-800 pt-4 flex justify-between items-center">
                                    <span className="text-xs font-black text-zinc-400 uppercase tracking-widest">TOTAL DAILY TSS</span>
                                    <span className="text-xl font-black text-lime-400 italic">{daily.tss || 0}</span>
                                </div>
                                
                                {daily.vcrUpgraded && (
                                    <div className="mt-6 bg-fuchsia-500/10 border border-fuchsia-500/30 p-4 rounded-xl text-center animate-pulse">
                                        <p className="text-sm text-fuchsia-400 font-black uppercase tracking-widest">🎉 VCR Level Up!</p>
                                        <p className="text-xs text-zinc-300 mt-2 font-bold">สถิติดีขึ้น AI อัปเกรด VCR ให้เป็น {daily.newVcrVal}m อัตโนมัติ</p>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        <div className={`bg-[#18181b] p-6 rounded-xl border ${displayActivities.length > 0 ? 'border-cyan-800/50' : 'border-zinc-700'}`}>
                            <p className={`text-xs font-black uppercase tracking-widest mb-4 ${displayActivities.length > 0 ? 'text-cyan-400' : 'text-zinc-400'}`}>
                                {displayActivities.length > 0 ? t.addAnotherAct : t.activityLogger}
                            </p>
                            
                            <div className="flex gap-2 mb-4">
                                <select value={inAct} onChange={e=>setInAct(e.target.value)} className="bg-black p-4 rounded-xl border border-zinc-700 text-center font-bold text-xs text-white outline-none focus:border-[#bef264] flex-1">
                                    <option value="Run">🏃‍♂️ Run</option>
                                    <option value="Trail">⛰️ Trail</option>
                                    <option value="Swim">🏊‍♂️ Swim</option>
                                    <option value="Bike">🚴‍♂️ Bike</option>
                                    <option value="Other">🏋️‍♂️ Other (Weight/Yoga)</option>
                                </select>
                                <label className={`flex-[2] border ${isScanning ? 'bg-zinc-800 border-cyan-800 text-cyan-500' : 'bg-cyan-950/30 border-cyan-800 text-cyan-400 hover:bg-cyan-900/50'} p-4 rounded-xl text-center font-bold text-xs flex justify-center items-center gap-2 cursor-pointer active:scale-95 transition-all`}>
                                    {isScanning ? <span className="animate-pulse">🔄 AI กำลังสแกนรูป...</span> : <>📸 สแกนรูปจากนาฬิกา / Strava<input type="file" accept="image/*" className="hidden" onChange={handleScanImage} /></>}
                                </label>
                            </div>
                            {scanError && <p className="text-red-400 text-xs font-bold text-center mb-4 bg-red-500/10 p-2 rounded-lg border border-red-500/20">{scanError}</p>}

                            {isRunOrTrail ? (
                                <div className="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6">
                                    <input type="number" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-[#bef264]" placeholder={t.distPlace}/>
                                    <input type="text" value={inPace} onChange={e=>setInPace(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-[#bef264]" placeholder={t.pacePlace}/>
                                    <input type="number" value={inElevation} onChange={e=>setInElevation(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-cyan-400" placeholder={t.elevPlace}/>
                                    <input type="number" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-red-400" placeholder={t.hrPlace}/>
                                    <input type="number" value={inCadence} onChange={e=>setInCadence(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-orange-400" placeholder={t.spmPlace}/>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-6">
                                    <input type="number" value={inDuration} onChange={e=>setInDuration(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-[#bef264]" placeholder={t.durationPlace}/>
                                    <input type="number" value={inDist} onChange={e=>setInDist(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-[#bef264]" placeholder={t.distPlace}/>
                                    <input type="number" value={inHr} onChange={e=>setInHr(e.target.value)} className="bg-black p-3 rounded-xl border border-zinc-700 text-center font-bold text-sm md:text-lg text-white outline-none focus:border-red-400" placeholder={t.hrPlace}/>
                                </div>
                            )}

                            <button onClick={saveRun} disabled={isRunOrTrail ? (!inDist || !inPace) : !inDuration} className={`w-full py-5 rounded-xl uppercase tracking-widest text-sm font-black disabled:opacity-30 disabled:grayscale transition-all active:scale-95 ${displayActivities.length > 0 ? 'bg-cyan-500 text-black shadow-[0_0_15px_rgba(6,182,212,0.2)]' : 'suunto-bg-accent shadow-[0_0_15px_rgba(190,242,100,0.1)]'}`}>{t.saveActivity}</button>
                        </div>

                    </section>
                </div>
            );
        };

        const TabPlan = ({ cfg, prof, weekIdx, isHotWeather, updateDaily, updateSchedule, activeDateStr, activeDateObj, lang }) => {
            const t = i18n[lang];
            const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const scheduleMap = { 'rest': 'Rest', 'easy': 'Easy', 'speed': 'Speed Work', 'long': 'Long Run' };
            const colorMap = { 'rest': 'text-zinc-500', 'easy': 'text-lime-400', 'speed': 'text-orange-400', 'long': 'text-red-400' };
            
            const activeIdx = activeDateObj.getDay();
            const dailyRec = prof.records?.[activeDateStr];
            
            const currentSkipReason = dailyRec?.skipReason || (dailyRec?.isSick ? 'sick' : 'none');

            const [swapMode, setSwapMode] = useState(false);
            const [selectedIdx, setSelectedIdx] = useState(null);

            return (
                <div className="space-y-6 pb-12">
                    <section className="suunto-card p-8 border-t-4 border-t-zinc-700">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-4">{t.coachBriefing}</h2>
                        <p className="text-lg font-bold text-zinc-100 leading-relaxed italic">"{cfg.advice}"</p>
                    </section>

                    <section className="suunto-card p-8">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest">{t.todayProtocol}</h2>
                            <div className="flex gap-2">
                                {isHotWeather && <span className="bg-orange-500/20 text-orange-400 border border-orange-500/50 px-2 py-1 rounded text-[10px] font-black uppercase">☀️</span>}
                                <select 
                                    value={currentSkipReason}
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        updateDaily({ skipReason: val, isSick: val === 'sick' });
                                        if (val === 'sick') {
                                            alert(lang === 'th' ? "บันทึกสถานะพักป่วยแล้ว โค้ช AI จะปรับตารางวันถัดไปให้เบาลงเพื่อฟื้นฟูร่างกายครับ 🤒" : "Sick day logged. AI Coach will adjust the next workout for recovery. 🤒");
                                        } else if (val === 'busy' || val === 'weather') {
                                            alert(lang === 'th' ? "บันทึกการเลื่อนซ้อมแล้ว พรุ่งนี้ค่อยกลับมาลุยตามตารางปกตินะครับ! 💪" : "Skip reason logged. Let's get back on track tomorrow! 💪");
                                        }
                                    }}
                                    className={`px-2 py-1.5 rounded text-[10px] md:text-xs font-black uppercase border transition-all outline-none cursor-pointer ${
                                        currentSkipReason !== 'none'
                                        ? (currentSkipReason === 'sick' ? 'bg-red-500/20 text-red-400 border-red-500/50' : 'bg-orange-500/20 text-orange-400 border-orange-500/50')
                                        : 'bg-[#18181b] text-zinc-500 border-zinc-700 hover:text-white'
                                    }`}
                                >
                                    <option value="none">{t.skipNone}</option>
                                    <option value="sick">{t.skipReasonSick}</option>
                                    <option value="busy">{t.skipReasonBusy}</option>
                                    <option value="weather">{t.skipReasonWeather}</option>
                                </select>
                            </div>
                        </div>
                        <div className="mb-6 pb-6 border-b border-zinc-800">
                            <p className="text-3xl font-black text-white uppercase italic">{cfg.name}</p>
                            <div className="flex gap-3 mt-4">
                                {cfg.pace !== '-' && <span className="bg-[#18181b] border border-zinc-700 px-4 py-2 rounded-lg text-cyan-400 font-black text-xs tracking-widest">PACE: {cfg.pace}</span>}
                                {cfg.hr !== '-' && <span className="bg-[#18181b] border border-zinc-700 px-4 py-2 rounded-lg text-red-400 font-black text-xs tracking-widest">HR: {cfg.hr}</span>}
                            </div>
                        </div>
                        
                        {cfg.coachLogic && (
                            <div className="mb-6 p-4 rounded-xl bg-[#bef264]/10 border border-[#bef264]/30 text-zinc-300 text-xs font-medium leading-relaxed">
                                {cfg.coachLogic}
                            </div>
                        )}

                        <div className="space-y-6">
                            <div><p className="text-xs font-black text-orange-400 uppercase mb-3 tracking-widest">WARM-UP</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.warmup.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                            <div><p className="text-xs font-black suunto-accent uppercase mb-3 tracking-widest">MAIN SET</p><p className="text-lg font-black text-white bg-[#18181b] p-5 rounded-xl border border-zinc-700 leading-relaxed">{cfg.detailedWorkout.main}</p></div>
                            <div><p className="text-xs font-black text-cyan-400 uppercase mb-3 tracking-widest">COOL-DOWN</p><ul className="list-disc list-inside text-base font-bold text-zinc-300 space-y-2">{cfg.detailedWorkout.cooldown.map((i,idx)=><li key={idx}>{i}</li>)}</ul></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest mb-6">{t.nutritionGuide}</h2>
                        <div className="space-y-4 mb-6">
                            {[ {k:'b', t:t.breakfast, c:'text-yellow-400'}, {k:'l', t:t.lunch, c:'text-orange-400'}, {k:'s', t:t.snack, c:'text-fuchsia-400'}, {k:'d', t:t.dinner, c:'text-blue-400'} ].map(m => {
                                const d = cfg.detailedMeals[m.k]; if(!d) return null;
                                return (
                                    <div key={m.k} className="bg-[#18181b] p-5 rounded-xl border border-zinc-800">
                                        <p className={`text-xs font-black uppercase tracking-widest mb-2 ${m.c}`}>{m.t}</p>
                                        <p className="text-base font-black text-white leading-relaxed">{d.menu}</p>
                                        <p className="text-sm text-zinc-400 mt-2 font-bold">{d.detail}</p>
                                    </div>
                                )
                            })}
                        </div>
                        
                        <div className="bg-[#bef264]/10 border border-[#bef264]/30 p-5 rounded-xl flex items-start gap-4">
                            <span className="text-2xl">💡</span>
                            <div>
                                <p className="text-xs font-black text-[#bef264] uppercase tracking-widest mb-2">
                                    {prof.primaryGoal === 'weight_loss' ? 'CALORIE & PROTEIN FOCUS' : 'FUELING STRATEGY'}
                                </p>
                                <p className="text-base text-zinc-200 font-bold">
                                    {prof.primaryGoal === 'weight_loss' 
                                        ? `ทานโปรตีน ${Math.round((prof.weight||90) * 1.6)} กรัม/วัน เพื่อรักษาเตาเผาไขมัน และลดแป้งมื้อเย็น` 
                                        : `โหลดคาร์บก่อนวันซ้อมหนัก! ทานโปรตีน ${Math.round((prof.weight||90) * 1.5)} กรัม/วัน เพื่อซ่อมแซมกล้ามเนื้อ`}
                                </p>
                            </div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <div className="flex justify-between items-start mb-5">
                            <h2 className="font-black text-sm text-zinc-400 uppercase tracking-widest flex items-center gap-2"><span>📅</span> {t.weeklySchedule}</h2>
                            <button 
                                onClick={() => { setSwapMode(!swapMode); setSelectedIdx(null); }}
                                className={`px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all flex items-center gap-1.5 border ${swapMode ? 'bg-[#bef264]/20 text-[#bef264] border-[#bef264]/50 shadow-[0_0_10px_rgba(190,242,100,0.2)]' : 'bg-[#18181b] text-zinc-500 border-zinc-700 hover:text-zinc-300'}`}
                            >
                                🔄 {swapMode ? (lang==='th'?'ยกเลิกสลับ':'Cancel Swap') : (lang==='th'?'จัดตารางซ้อม':'Edit Schedule')}
                            </button>
                        </div>

                        {swapMode && (
                            <div className="mb-5 bg-[#bef264]/10 border border-[#bef264]/30 p-3 rounded-xl text-[#bef264] text-xs font-bold text-center animate-pulse">
                                {selectedIdx === null 
                                    ? (lang==='th'?'👆 แตะเลือก "วันแรก" ที่ต้องการย้าย':'👆 Tap the first day to move')
                                    : (lang==='th'?'✨ แตะเลือก "วันที่สอง" เพื่อสลับตารางทันที!':'✨ Tap the second day to swap!')}
                            </div>
                        )}

                        <div className="space-y-3">
                            {dayNames.map((day, idx) => {
                                const type = prof?.schedule?.[idx] || 'rest';
                                const isToday = activeIdx === idx;
                                
                                const dummyDate = new Date(activeDateObj);
                                dummyDate.setDate(dummyDate.getDate() + (idx - activeIdx));
                                
                                let prevSkip = 'none';
                                if (idx > 0) {
                                    let prevDate = new Date(dummyDate);
                                    prevDate.setDate(prevDate.getDate() - 1);
                                    prevSkip = prof.records?.[prevDate.toDateString()]?.skipReason || (prof.records?.[prevDate.toDateString()]?.isSick ? 'sick' : 'none');
                                }

                                const dayCfg = getDayConfig(dummyDate, weekIdx, false, prof, false, prevSkip, 100, 420, lang);

                                return (
                                    <div 
                                        key={idx} 
                                        onClick={() => {
                                            if(!swapMode) return;
                                            if(selectedIdx === null) setSelectedIdx(idx);
                                            else {
                                                if(selectedIdx !== idx) {
                                                    const newSched = {...prof.schedule};
                                                    const temp = newSched[selectedIdx];
                                                    newSched[selectedIdx] = newSched[idx];
                                                    newSched[idx] = temp;
                                                    updateSchedule(newSched);
                                                }
                                                setSelectedIdx(null);
                                                setSwapMode(false);
                                            }
                                        }}
                                        className={`p-5 rounded-xl border flex flex-col gap-2 transition-colors ${swapMode ? 'cursor-pointer hover:border-[#bef264] hover:bg-[#121212]' : ''} ${selectedIdx === idx ? 'bg-[#bef264]/10 border-[#bef264] shadow-[0_0_15px_rgba(190,242,100,0.15)]' : isToday ? 'bg-zinc-800 border-zinc-500 shadow-md' : 'bg-[#18181b] border-zinc-800'}`}
                                    >
                                        <div className="flex justify-between items-center pointer-events-none">
                                            <span className={`text-sm font-black uppercase tracking-widest ${isToday ? 'text-white' : 'text-zinc-500'}`}>{day} {isToday && '(SELECTED)'}</span>
                                            <span className={`text-sm font-black uppercase tracking-widest ${colorMap[type]}`}>{scheduleMap[type]}</span>
                                        </div>
                                        {type !== 'rest' && (
                                            <div className="mt-2 pt-3 border-t border-zinc-700/50 pointer-events-none">
                                                <p className={`text-xs font-bold leading-relaxed mb-3 ${isToday ? 'text-white' : 'text-zinc-400'}`}>
                                                    {dayCfg.isDowngraded && <span className="text-orange-400 font-black mr-1">{lang === 'th' ? '[ปรับลด]' : '[DOWNGRADED]'}</span>}
                                                    {dayCfg.detailedWorkout.main}
                                                </p>
                                                <div className="flex gap-2">
                                                    {dayCfg.pace !== '-' && <span className="text-[10px] font-black text-cyan-400 bg-cyan-400/10 px-2.5 py-1 rounded">PACE: {dayCfg.pace}</span>}
                                                    {dayCfg.hr !== '-' && <span className="text-[10px] font-black text-red-400 bg-red-400/10 px-2.5 py-1 rounded">HR: {dayCfg.hr}</span>}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </section>
                </div>
            );
        };

        const TabRanking = ({ leaderboardData, lang }) => {
            const t = i18n[lang];
            return (
                <section className="space-y-6 pb-12">
                    <div className="text-center mb-8 pt-4">
                        <h2 className="text-4xl font-black text-white italic uppercase tracking-tighter">{t.leaderboard}</h2>
                        <p className="text-xs font-bold text-zinc-400 uppercase tracking-widest mt-2">{t.weeklyMileage}</p>
                    </div>
                    <div className="space-y-4">
                        {leaderboardData.length === 0 ? <div className="text-center p-10 suunto-card text-zinc-400 font-bold text-base tracking-widest uppercase">LOADING...</div> : 
                            leaderboardData.map((runner, idx) => {
                                let bg = 'bg-[#18181b] border-zinc-800', txt = 'text-white', numColor = 'text-zinc-500';
                                if (idx === 0) { bg = 'bg-zinc-900 border-[#bef264]/40 shadow-lg shadow-[#bef264]/5'; txt = 'suunto-accent'; numColor = 'suunto-accent'; }
                                else if (idx === 1) { txt = 'text-zinc-200'; numColor = 'text-zinc-400'; }
                                else if (idx === 2) { txt = 'text-zinc-400'; numColor = 'text-zinc-500'; }
                                return (
                                    <div key={idx} className={`p-6 rounded-2xl border flex items-center justify-between ${bg}`}>
                                        <div className="flex items-center gap-5">
                                            <div className={`w-10 font-black text-3xl text-center italic ${numColor}`}>{idx + 1}</div>
                                            <div>
                                                <h3 className={`font-black text-lg uppercase tracking-wider ${txt}`}>{runner.name} {idx===0&&'👑'}</h3>
                                                <p className="text-xs text-zinc-500 font-bold uppercase mt-1.5 tracking-widest">All-Time: {runner.tKm.toFixed(1)} KM</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className={`text-4xl font-black italic ${idx===0?'text-white':'text-zinc-400'}`}>{runner.wKm.toFixed(1)}</p>
                                        </div>
                                    </div>
                                )
                            })
                        }
                    </div>
                </section>
            );
        };

        const TabStats = ({ prof, vo2Value, tDist, pTime, pSource, fastest5kSecs, fastest10kSecs, longestRun, achievements, currentTss, lang, activeDateObj }) => {
            const t = i18n[lang];
            const [showStrategy, setShowStrategy] = useState(false);
            
            let vo2Color = "#ef4444", vo2Label = "POOR";
            if (vo2Value >= 35) { vo2Color = "#f97316"; vo2Label = "FAIR"; }
            if (vo2Value >= 40) { vo2Color = "#a3e635"; vo2Label = "GOOD"; }
            if (vo2Value >= 45) { vo2Color = "#60a5fa"; vo2Label = "EXCELLENT"; }
            if (vo2Value >= 50) { vo2Color = "#e879f9"; vo2Label = "SUPERIOR"; }
            const offset = 126 - (Math.min(100, ((vo2Value - 20) / 40) * 100) / 100) * 126;
            const mapGoal = 600;
            const mapProgress = Math.min((tDist / mapGoal) * 100, 100);

            let tssColor = "#a3e635", tssLabel = "FRESH";
            let tssAdvice = lang === 'th' 
                ? "ร่างกายฟื้นตัวได้ดีเยี่ยม! กล้ามเนื้อพร้อมลุยตามตารางซ้อม หรือจะเพิ่มความหนัก (Overload) เล็กน้อยก็รับไหวครับ 💪" 
                : "Great recovery! Your body is ready to push harder and follow the plan perfectly. 💪";
                
            if (currentTss > 300) { 
                tssColor = "#f97316"; 
                tssLabel = "FATIGUED"; 
                tssAdvice = lang === 'th'
                    ? "ร่างกายอยู่ในโซนพัฒนา (Productive) เริ่มมีความล้าสะสม โค้ชแนะนำให้คุมเพซและหัวใจตามตารางอย่างเคร่งครัด อย่าฝืนเร่งครับ 🐢"
                    : "Productive load. You have some accumulated fatigue. Stick to the training zones strictly today. 🐢";
            }
            if (currentTss > 500) { 
                tssColor = "#ef4444"; 
                tssLabel = "OVERTRAINED"; 
                tssAdvice = lang === 'th'
                    ? "⚠️ ล้าสะสมทะลุขีดแดง! ร่างกายกำลังประท้วงและเสี่ยงบาดเจ็บหนัก โค้ชสั่งพัก (Full Rest) หรือทำแค่จ๊อกกิ้งเบาๆ ทันทีครับ 🛑"
                    : "⚠️ High risk of injury! Coach strongly recommends taking a full rest day or doing light active recovery. 🛑";
            }
            const tssOffset = 126 - (Math.min(100, (currentTss / 600) * 100) / 100) * 126;

            const chartData = useMemo(() => {
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    let d = new Date(activeDateObj);
                    d.setDate(d.getDate() - i);
                    const dtStr = d.toDateString(); const record = prof?.records?.[dtStr];
                    
                    let dist = 0;
                    if(record?.rLog) {
                        const acts = record.activities || [];
                        if (acts.length > 0) {
                            acts.forEach(a => { if(a.type === 'Run' || a.type === 'Trail') dist += (parseFloat(a.dist)||0); });
                        } else if(record.rDist) {
                            dist = parseFloat(record.rDist);
                        }
                    }
                    
                    days.push({ day: dtStr.split(' ')[0], dist: dist || 0, isToday: i === 0 });
                }
                return days;
            }, [prof?.records, activeDateObj]);

            const maxChartDist = Math.max(...chartData.map(d => d.dist), 5); 

            const tsbChartData = useMemo(() => {
                const data = [];
                let currentCTL = 0; 
                let currentATL = 0; 
                
                for(let i=30; i>=0; i--) {
                    let d = new Date(activeDateObj);
                    d.setDate(d.getDate() - i);
                    const dtStr = d.toDateString();
                    const dailyTss = prof?.records?.[dtStr]?.tss || 0;
                    
                    currentCTL = (dailyTss * (2/43)) + (currentCTL * (1 - 2/43));
                    currentATL = (dailyTss * (2/8)) + (currentATL * (1 - 2/8));
                    
                    data.push({
                        day: d.getDate(),
                        ctl: currentCTL,
                        atl: currentATL,
                        tsb: currentCTL - currentATL
                    });
                }
                return data;
            }, [prof?.records, activeDateObj]);

            const maxTsbVal = Math.max(...tsbChartData.map(d => Math.max(d.ctl, d.atl, Math.abs(d.tsb), 10)));

            const todayTsb = tsbChartData[tsbChartData.length - 1];
            const getTsbAnalysis = (tsb) => {
                if (tsb < -30) return lang === 'th' ? "🚨 โค้ชเตือน: คุณอยู่ในโซน 'อันตราย' (Overreaching) ร่างกายล้าสะสมหนักมาก (ค่าเกิน -30) เสี่ยงบาดเจ็บและป่วยสูง ควรพักผ่อนเต็มวันหรือทำแค่ Active Recovery ด่วนครับ!" : "🚨 AI Warning: 'Danger' zone (Overreaching). High risk of injury. Full rest needed!";
                if (tsb >= -30 && tsb < -10) return lang === 'th' ? "📈 โค้ชวิเคราะห์: คุณอยู่ในโซน 'พัฒนา' (Optimal Training) ร่างกายกำลังรับโหลดเพื่อสร้างความฟิต เป็นเรื่องปกติที่จะรู้สึกปวดเมื่อยล้า คุมโภชนาการและการนอนให้ดีครับ!" : "📈 AI Analysis: 'Optimal Training' zone. Building fitness while accumulating fatigue. Focus on nutrition!";
                if (tsb >= -10 && tsb <= 5) return lang === 'th' ? "⚖️ โค้ชวิเคราะห์: คุณอยู่ในโซน 'ทรงตัว' (Neutral) ร่างกายรับมือกับการซ้อมได้ดี สมดุลระหว่างความฟิตและความล้ากำลังสวย ลุยตามตารางต่อได้เลย" : "⚖️ AI Analysis: 'Neutral' zone. Good balance between fitness and fatigue. Keep it up.";
                if (tsb > 5 && tsb <= 25) return lang === 'th' ? "✨ โค้ชวิเคราะห์: คุณอยู่ในโซน 'พร้อมรบ' (Fresh) ร่างกายสดชื่นมาก ความล้าหายไปหมดแล้ว เหมาะกับการลงคอร์ทหนักๆ ทำเวลาสถิติใหม่ หรือลงแข่งสุดๆ ครับ!" : "✨ AI Analysis: 'Fresh' zone. Fatigue is cleared. Perfect time for a PR attempt or Race Day!";
                return lang === 'th' ? "📉 โค้ชเตือน: คุณอยู่ในโซน 'พักนานเกินไป' (Transition) ความสดสูงมากก็จริง แต่ความฟิต (เส้นสีฟ้า) กำลังจะตก ต้องกลับมาซ้อมเพื่อกระตุ้นร่างกายแล้วครับ!" : "📉 AI Warning: 'Transition' zone. Too fresh, fitness is dropping. Time to get back to training!";
            };

            const getPaceFromVcr = (pct) => {
                const spd = (prof.vcr || 4500) / 1800 * (pct / 100);
                if (spd <= 0) return "0:00";
                const baseSecs = Math.round(1000 / spd);
                
                let fastSecs = baseSecs - 10; 
                let slowSecs = baseSecs + 15;
                if(pct >= 85) { fastSecs = baseSecs - 5; slowSecs = baseSecs + 10; }
                if(pct <= 70) { fastSecs = baseSecs - 15; slowSecs = baseSecs + 20; }

                const fmt = (s) => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
                return `${fmt(fastSecs)} - ${fmt(slowSecs)}`;
            };

            let predSecs = 0;
            if (fastest10kSecs !== Infinity) predSecs = fastest10kSecs * 10 * Math.pow(prof.targetDist/10, 1.06);
            else if (fastest5kSecs !== Infinity) predSecs = fastest5kSecs * 5 * Math.pow(prof.targetDist/5, 1.06);
            else {
                const vcrKm = (prof.vcr || 4500) / 1000;
                predSecs = 1800 * Math.pow(prof.targetDist / vcrKm, 1.06);
            }
            const avgPaceSecs = predSecs / prof.targetDist;
            const formatP = (s) => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

            let strategy = [];
            
            if (prof.targetDist == 42.195) {
                strategy = [
                    { phase: '1', label: 'Warm Up', km: 'KM 1 - 5', pace: `${formatP(avgPaceSecs + 15)} - ${formatP(avgPaceSecs + 25)}`, desc: 'วิ่งสบายๆ คุมหัวใจไม่ให้พุ่ง อุ่นเครื่องกล้ามเนื้อ' },
                    { phase: '2', label: 'Settle In', km: 'KM 6 - 30', pace: `${formatP(avgPaceSecs - 5)} - ${formatP(avgPaceSecs + 5)}`, desc: 'ล็อกความเร็วเป้าหมาย ดื่มน้ำทุกจุด กินเจลทุก 45 นาที' },
                    { phase: '3', label: 'The Wall', km: 'KM 31 - 40', pace: `${formatP(avgPaceSecs)} - ${formatP(avgPaceSecs + 15)}`, desc: 'รักษารอบขา ประคองสติ ร่างกายจะล้าถึงขีดสุด' },
                    { phase: '4', label: 'Finish Strong', km: 'KM 41 - 42.195', pace: `ใส่ให้หมด!`, desc: 'รวบรวมพลังเฮือกสุดท้าย พับเข่าดึงเท้าเข้าเส้นชัย!' }
                ];
                if (prof.targetRaceCourse === 'bangsaen42') {
                    strategy[2].desc += " ⛰️ โค้ชเตือน: ระวังเนินเขาสามมุขช่วง KM 35 ให้สับก้าวสั้นๆ ดรอปเพซ 20-30 วิ เซฟแรงไว้ครับ!";
                } else if (prof.targetRaceCourse === 'buriram') {
                    strategy[2].desc += " 🛣️ โค้ชเตือน: ช่วงนี้มีเนินซึมยาวๆ คุมจังหวะหายใจให้คงที่ อย่าเพิ่งเร่งตามคนอื่น";
                } else if (prof.targetRaceCourse === 'bkk') {
                    strategy[1].desc += " 🌉 โค้ชเตือน: เตรียมรับมือสะพานยกระดับยาวๆ และความร้อน รักษารอบขาให้คงที่";
                }
            } else if (prof.targetDist == 21.1) {
                strategy = [
                    { phase: '1', label: 'Warm Up', km: 'KM 1 - 3', pace: `${formatP(avgPaceSecs + 10)} - ${formatP(avgPaceSecs + 20)}`, desc: 'อย่าเพิ่งรีบตามคนอื่น ให้ร่างกายและข้อต่อปรับตัว' },
                    { phase: '2', label: 'Cruising', km: 'KM 4 - 15', pace: `${formatP(avgPaceSecs - 5)} - ${formatP(avgPaceSecs + 5)}`, desc: 'ล็อกเพซเป้าหมาย เติมเจลที่ KM 10' },
                    { phase: '3', label: 'Push', km: 'KM 16 - 20', pace: `${formatP(avgPaceSecs - 10)} - ${formatP(avgPaceSecs)}`, desc: 'เริ่มเร่งความเร็วขึ้น ถ้าร่างกายและหัวใจยังไหว' },
                    { phase: '4', label: 'Sprint', km: 'KM 21 - 21.1', pace: `ใส่ให้หมด!`, desc: 'สปรินต์เข้าเส้นชัยด้วยความเร็วสูงสุด!' }
                ];
                if (prof.targetRaceCourse === 'bangsaen42') {
                    strategy[2].desc += " ⛰️ โค้ชเตือน: เตรียมเจอเนินเขาสามมุข ซอยเท้าให้ถี่ขึ้นครับ!";
                }
            } else if (prof.targetDist == 10) {
                strategy = [
                    { phase: '1', label: 'Warm Up', km: 'KM 1 - 2', pace: `${formatP(avgPaceSecs + 10)} - ${formatP(avgPaceSecs + 15)}`, desc: 'เครื่องยังไม่ร้อน คุมเพซไว้ก่อนอย่าออกตัวแรง' },
                    { phase: '2', label: 'Race Pace', km: 'KM 3 - 8', pace: `${formatP(avgPaceSecs - 5)} - ${formatP(avgPaceSecs + 5)}`, desc: 'เกาะเพซเป้าหมาย รักษาจังหวะหายใจให้สม่ำเสมอ' },
                    { phase: '3', label: 'Sprint', km: 'KM 9 - 10', pace: `${formatP(avgPaceSecs - 15)} - ${formatP(avgPaceSecs - 5)}`, desc: 'เร่งเต็มกำลังที่มี!' }
                ];
            } else {
                strategy = [
                    { phase: '1', label: 'Start', km: 'KM 1', pace: `${formatP(avgPaceSecs + 5)} - ${formatP(avgPaceSecs + 10)}`, desc: 'คุมสติ อย่ากระชากออกตัวแรงเกินไป' },
                    { phase: '2', label: 'Push', km: 'KM 2 - 4', pace: `${formatP(avgPaceSecs - 5)} - ${formatP(avgPaceSecs + 5)}`, desc: 'รักษาเพซเป้าหมาย ทนความล้า' },
                    { phase: '3', label: 'Sprint', km: 'KM 5', pace: `ใส่ให้หมด!`, desc: 'สปรินต์เข้าเส้นชัย!' }
                ];
            }

            return (
                <div className="space-y-6 pb-14">
                    <section className="suunto-card p-10 text-center border-t-2 border-t-zinc-700">
                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div>
                                <h2 className="font-black text-[10px] md:text-xs text-zinc-400 uppercase tracking-widest mb-4">PEAK VO2 MAX</h2>
                                <div className="flex justify-center mb-4">
                                    <div className="relative w-32 h-16 md:w-40 md:h-20 overflow-hidden">
                                        <svg className="w-full h-full" viewBox="0 0 100 50">
                                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="8" strokeLinecap="round" />
                                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={vo2Color} strokeWidth="8" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: offset}} />
                                        </svg>
                                        <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center">
                                            <span className="text-3xl md:text-4xl font-black tracking-tighter italic" style={{color: vo2Color}}>{vo2Value}</span>
                                        </div>
                                    </div>
                                </div>
                                <span className="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-black border border-zinc-800" style={{color: vo2Color}}>{vo2Label}</span>
                            </div>
                            
                            <div>
                                <h2 className="font-black text-[10px] md:text-xs text-zinc-400 uppercase tracking-widest mb-4">7-DAY TSS LOAD</h2>
                                <div className="flex justify-center mb-4">
                                    <div className="relative w-32 h-16 md:w-40 md:h-20 overflow-hidden">
                                        <svg className="w-full h-full" viewBox="0 0 100 50">
                                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#27272a" strokeWidth="8" strokeLinecap="round" />
                                            <path d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke={tssColor} strokeWidth="8" strokeLinecap="round" className="gauge-arc" style={{strokeDashoffset: tssOffset}} />
                                        </svg>
                                        <div className="absolute bottom-0 left-0 right-0 flex flex-col items-center">
                                            <span className="text-3xl md:text-4xl font-black tracking-tighter italic" style={{color: tssColor}}>{currentTss}</span>
                                        </div>
                                    </div>
                                </div>
                                <span className="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-black border border-zinc-800" style={{color: tssColor}}>{tssLabel}</span>
                            </div>
                        </div>

                        <div className="bg-[#18181b] border border-zinc-800 p-4 md:p-5 rounded-xl text-left flex items-start gap-3 md:gap-4 mt-2">
                            <span className="text-2xl md:text-3xl mt-1">🤖</span>
                            <div>
                                <p className="text-[10px] font-black uppercase text-zinc-400 tracking-widest mb-1.5 md:mb-2">
                                    {lang === 'th' ? 'AI วิเคราะห์ความล้า (TSS Analysis)' : 'AI Fatigue Analysis'}
                                </p>
                                <p className="text-sm md:text-base font-bold text-zinc-200 leading-relaxed">
                                    {tssAdvice}
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* 🌟 ส่วนแสดงผลกราฟ TSB ฉบับปรับปรุง Mobile-First + โค้ช AI ช่วยแปลผล 🌟 */}
                    <section className="suunto-card p-6 md:p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-4 flex items-center gap-2"><span>📈</span> FITNESS TREND (TSB)</h2>
                        
                        {/* เลื่อน Legend มาไว้ด้านบนแบบยืดหยุ่น เพื่อไม่ให้บังทับกราฟบนจอมือถือ */}
                        <div className="flex flex-wrap gap-x-4 gap-y-2 mb-4 text-[10px] font-bold">
                            <div className="flex items-center gap-1.5"><div className="w-3 h-1 bg-blue-500 rounded"></div><span className="text-blue-400 uppercase">Fitness (ฟิต)</span></div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-1 bg-pink-500 border-dashed rounded"></div><span className="text-pink-400 uppercase">Fatigue (ล้า)</span></div>
                            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-[#bef264]/40 rounded"></div><span className="text-[#bef264] uppercase">Form (สด)</span></div>
                        </div>

                        {/* ปรับความสูงกราฟ และใช้ vectorEffect="non-scaling-stroke" */}
                        <div className="relative w-full h-56 md:h-64 bg-[#18181b] rounded-xl border border-zinc-800 p-0 overflow-hidden flex items-end">
                            
                            {/* ป้ายกำกับแกน Y และ X จางๆ */}
                            <div className="absolute top-2 left-2 text-[9px] text-zinc-600 font-black">MAX</div>
                            <div className="absolute top-1/2 left-2 -translate-y-1/2 text-[9px] text-zinc-600 font-black">0</div>
                            <div className="absolute bottom-6 left-2 text-[9px] text-zinc-600 font-black">MIN</div>
                            <div className="absolute bottom-2 left-6 text-[9px] text-zinc-500 font-black bg-[#18181b] px-1 rounded">-30 วัน</div>
                            <div className="absolute bottom-2 right-2 text-[9px] text-white font-black bg-zinc-800 px-2 py-0.5 rounded">วันนี้</div>

                            <svg className="w-full h-full" viewBox="0 0 300 100" preserveAspectRatio="none">
                                <line x1="0" y1="50" x2="300" y2="50" stroke="#3f3f46" strokeWidth="1" strokeDasharray="4" vectorEffect="non-scaling-stroke" />
                                
                                <path d={`M 0 50 ${tsbChartData.map((d, i) => `L ${i * 10} ${50 - (d.tsb / maxTsbVal) * 40}`).join(' ')} L 300 50 Z`} fill="rgba(190, 242, 100, 0.2)" />
                                <path d={`M 0 ${50 - (tsbChartData[0].tsb / maxTsbVal) * 40} ${tsbChartData.map((d, i) => `L ${i * 10} ${50 - (d.tsb / maxTsbVal) * 40}`).join(' ')}`} fill="none" stroke="#bef264" strokeWidth="1" vectorEffect="non-scaling-stroke" />
                                
                                <path d={`M 0 ${90 - (tsbChartData[0].ctl / maxTsbVal) * 80} ${tsbChartData.map((d, i) => `L ${i * 10} ${90 - (d.ctl / maxTsbVal) * 80}`).join(' ')}`} fill="none" stroke="#3b82f6" strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
                                
                                <path d={`M 0 ${90 - (tsbChartData[0].atl / maxTsbVal) * 80} ${tsbChartData.map((d, i) => `L ${i * 10} ${90 - (d.atl / maxTsbVal) * 80}`).join(' ')}`} fill="none" stroke="#ec4899" strokeWidth="1.5" strokeDasharray="3" vectorEffect="non-scaling-stroke" />
                            </svg>
                        </div>
                        <p className="text-[10px] md:text-xs text-zinc-500 mt-4 font-medium leading-relaxed">
                            {lang === 'th' ? '*จำลองการคำนวณ 30 วันย้อนหลัง: เส้นสีฟ้า (ความฟิต) ควรค่อยๆ สูงขึ้น, สีชมพู (ความล้า) จะพุ่งตอนซ้อมหนัก, พื้นที่สีเขียว (ความสด) ยิ่งบวกเยอะยิ่งพร้อมแข่ง' : '*30-Day Simulation: Blue (Fitness) should trend up, Pink (Fatigue) spikes on hard days, Green (Form) indicates race readiness.'}
                        </p>

                        {/* 🌟 กล่อง AI วิเคราะห์ทิศทางร่างกายจาก TSB 🌟 */}
                        <div className="mt-5 bg-zinc-900 border border-zinc-800 p-4 md:p-5 rounded-xl text-left flex items-start gap-3 md:gap-4">
                            <span className="text-2xl md:text-3xl mt-1">🧠</span>
                            <div>
                                <p className="text-[10px] font-black uppercase text-[#bef264] tracking-widest mb-1.5 md:mb-2">
                                    {lang === 'th' ? 'AI วิเคราะห์แนวโน้มร่างกาย (TSB Analysis)' : 'AI TSB Analysis'}
                                </p>
                                <p className="text-sm md:text-base font-bold text-zinc-200 leading-relaxed">
                                    {getTsbAnalysis(todayTsb.tsb)}
                                </p>
                            </div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>🎯</span> TRAINING ZONES</h2>
                        <div className="space-y-3">
                            <div className="bg-[#18181b] p-5 rounded-xl border border-l-4 border-l-lime-400 border-zinc-800 flex justify-between items-center">
                                <div><p className="text-xs font-black text-lime-400 uppercase tracking-widest">EASY (Zone 2)</p><p className="text-[10px] text-zinc-500 font-bold mt-1 uppercase">Recovery / Base</p></div>
                                <div className="text-right"><p className="text-base font-black text-white italic">{getPaceFromVcr(75)} <span className="text-[10px] text-zinc-500 normal-case font-bold">/km</span></p><p className="text-xs font-bold text-zinc-400 mt-1">{getHrZone(0.6, 0.7, prof.age, prof.rhr)}</p></div>
                            </div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-l-4 border-l-cyan-400 border-zinc-800 flex justify-between items-center">
                                <div><p className="text-xs font-black text-cyan-400 uppercase tracking-widest">AEROBIC (Zone 3)</p><p className="text-[10px] text-zinc-500 font-bold mt-1 uppercase">Long Run / Endurance</p></div>
                                <div className="text-right"><p className="text-base font-black text-white italic">{getPaceFromVcr(80)} <span className="text-[10px] text-zinc-500 normal-case font-bold">/km</span></p><p className="text-xs font-bold text-zinc-400 mt-1">{getHrZone(0.7, 0.8, prof.age, prof.rhr)}</p></div>
                            </div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-l-4 border-l-orange-400 border-zinc-800 flex justify-between items-center">
                                <div><p className="text-xs font-black text-orange-400 uppercase tracking-widest">TEMPO (Zone 4)</p><p className="text-[10px] text-zinc-500 font-bold mt-1 uppercase">Threshold / Race</p></div>
                                <div className="text-right"><p className="text-base font-black text-white italic">{getPaceFromVcr(90)} <span className="text-[10px] text-zinc-500 normal-case font-bold">/km</span></p><p className="text-xs font-bold text-zinc-400 mt-1">{getHrZone(0.8, 0.88, prof.age, prof.rhr)}</p></div>
                            </div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-l-4 border-l-red-500 border-zinc-800 flex justify-between items-center">
                                <div><p className="text-xs font-black text-red-500 uppercase tracking-widest">INTERVAL (Zone 5)</p><p className="text-[10px] text-zinc-500 font-bold mt-1 uppercase">Speed / VO2 Max</p></div>
                                <div className="text-right"><p className="text-base font-black text-white italic">{getPaceFromVcr(105)} <span className="text-[10px] text-zinc-500 normal-case font-bold">/km</span></p><p className="text-xs font-bold text-zinc-400 mt-1">{getHrZone(0.88, 1.0, prof.age, prof.rhr)}</p></div>
                            </div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>📊</span> 7-DAY MILEAGE</h2>
                        <div className="flex items-end justify-between h-40 gap-1.5 sm:gap-3">
                            {chartData.map((data, i) => {
                                const heightPct = Math.max((data.dist / maxChartDist) * 100, 2);
                                return (
                                    <div key={i} className="flex flex-col items-center flex-1">
                                        <span className="text-[10px] sm:text-xs text-zinc-400 font-bold mb-2 h-4">{data.dist > 0 ? data.dist.toFixed(1) : ''}</span>
                                        <div className="w-full relative bg-[#18181b] rounded-t-md" style={{height: '100px'}}>
                                            <div className={`absolute bottom-0 left-0 w-full rounded-t-md transition-all duration-1000 ease-out ${data.isToday ? 'suunto-bg-accent' : 'bg-zinc-600'}`} style={{height: `${heightPct}%`}}></div>
                                        </div>
                                        <span className={`text-[10px] sm:text-xs font-black uppercase mt-3 tracking-wider ${data.isToday ? 'suunto-accent' : 'text-zinc-500'}`}>{data.day}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </section>
                    
                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6 flex items-center gap-2"><span>📍</span> VIRTUAL MAP</h2>
                        <p className="text-xs text-zinc-400 font-bold uppercase tracking-widest mb-4">สะสมระยะทาง {tDist.toFixed(1)} / {mapGoal} KM</p>
                        <div className="relative w-full h-8 bg-[#18181b] rounded-full border border-zinc-800 overflow-visible">
                            <div className="absolute top-0 left-0 h-full bg-cyan-600/60 rounded-full transition-all duration-1000" style={{width: `${mapProgress}%`}}></div>
                            <div className="absolute top-1/2 -translate-y-1/2 text-3xl drop-shadow-md transition-all duration-1000 z-10" style={{left: `calc(${mapProgress}% - 16px)`}}>🏃‍♂️</div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏆 PERSONAL BESTS</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">5K</p><p className="text-xl font-black text-white italic">{formatPace(fastest5kSecs)}</p></div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">10K</p><p className="text-xl font-black text-white italic">{formatPace(fastest10kSecs)}</p></div>
                            <div className="bg-[#18181b] p-5 rounded-xl border border-zinc-800 text-center"><p className="text-xs text-zinc-400 font-bold uppercase mb-2">MAX DIST</p><p className="text-xl font-black text-white italic">{longestRun.toFixed(1)}<span className="text-xs ml-1">K</span></p></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8">
                        <h2 className="font-black text-sm text-white uppercase tracking-widest mb-6">🏅 TROPHY ROOM</h2>
                        <div className="grid grid-cols-3 gap-4">
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.halfMarathon ? 'bg-yellow-500/10 border-yellow-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.halfMarathon ? '🎖️' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.halfMarathon ? 'text-yellow-400' : 'text-zinc-500'}`}>Half-Way</span></div>
                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.streakMaster ? 'bg-orange-500/10 border-orange-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.streakMaster ? '⚡' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.streakMaster ? 'text-orange-400' : 'text-zinc-500'}`}>Streak</span></div>
