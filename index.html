                            <div className={`p-5 rounded-xl border text-center transition-all ${achievements.aquaMan ? 'bg-cyan-500/10 border-cyan-500/30' : 'bg-[#18181b] border-zinc-800 opacity-50 grayscale'}`}><span className="text-3xl mb-3 block">{achievements.aquaMan ? '💦' : '🔒'}</span><span className={`text-xs font-black uppercase tracking-wider block ${achievements.aquaMan ? 'text-cyan-400' : 'text-zinc-500'}`}>Aqua Man</span></div>
                        </div>
                    </section>

                    <section className="suunto-card p-8 border-l-4 border-l-lime-500">
                        <div className="flex justify-between items-start mb-2">
                            <h2 className="font-black text-xs text-zinc-400 uppercase tracking-widest">AI PREDICTOR</h2>
                            <button onClick={() => setShowStrategy(!showStrategy)} className="text-[10px] font-black uppercase tracking-widest bg-lime-500/20 text-lime-400 border border-lime-500/50 px-3 py-1.5 rounded-lg active:scale-95 transition-all">
                                {showStrategy ? 'ปิดกลยุทธ์' : '🏁 กลยุทธ์วันแข่ง'}
                            </button>
                        </div>
                        <p className="text-sm text-lime-400 font-black uppercase tracking-widest mb-4">EST. {prof.targetDist}K TIME</p>
                        <p className="text-6xl font-black text-white italic tracking-tighter mb-5">{pTime}</p>
                        <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">REF: {pSource}</p>
                        
                        {showStrategy && (
                            <div className="mt-6 pt-6 border-t border-zinc-800 animate-in fade-in slide-in-from-top-4 duration-300">
                                <h3 className="text-sm font-black text-white uppercase tracking-widest mb-4">🏁 RACE PACING STRATEGY</h3>
                                <div className="space-y-3">
                                    {strategy.map((s, i) => (
                                        <div key={i} className="bg-[#18181b] p-4 rounded-xl border border-zinc-800 flex gap-4">
                                            <div className="w-12 h-12 shrink-0 bg-lime-500/10 text-lime-400 rounded-lg flex items-center justify-center font-black text-xl italic">{s.phase}</div>
                                            <div className="flex-1">
                                                <div className="flex justify-between items-center mb-1">
                                                    <p className="text-xs font-black text-zinc-400 uppercase tracking-widest">{s.km}</p>
                                                    <p className="text-sm font-black text-lime-400 italic">{s.pace}</p>
                                                </div>
                                                <p className="text-sm font-bold text-white mb-1">{s.label}</p>
                                                <p className="text-xs text-zinc-500 font-medium">{s.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 bg-blue-500/10 border border-blue-500/20 p-4 rounded-xl">
                                    <p className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">💡 WATER & FUEL TIP</p>
                                    <p className="text-xs font-bold text-zinc-300">แวะจิบน้ำทุก 2 กม. (อย่ารอให้หิว) และเติมเจลพลังงานทุกๆ 45 นาทีตลอดการแข่งขันครับ!</p>
                                </div>
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const Dashboard = ({ profileName, onLogout }) => {
            const [activeTab, setActiveTab] = useState('tracker');
            const [showSetup, setShowSetup] = useState(false);
            const [showToast, setShowToast] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [isHotWeather, setIsHotWeather] = useState(false);
            
            const [lang, setLang] = useState(() => safeStorage.getItem('p80_lang') || 'th');
            const t = i18n[lang];

            const toggleLang = () => {
                const newLang = lang === 'th' ? 'en' : 'th';
                setLang(newLang);
                safeStorage.setItem('p80_lang', newLang);
            };

            const safeName = profileName.trim().toLowerCase();
            const localKey = `p80_v14_stable_${safeName}`;
            
            const [prof, setProf] = useState(() => JSON.parse(safeStorage.getItem(localKey)) || {
                primaryGoal: 'performance', targetRaceCourse: 'standard', 
                initialWeight: null, weight: 90.0, targetWeight: 80.0, height: 175, gender: 'male',
                age: 35, rhr: 60, vcr: 4500, targetDist: 42.195, injury: 'none', lifestyle: 'active', raceDate: '2026-11-15',
                schedule: {0:'long', 1:'rest', 2:'easy', 3:'speed', 4:'rest', 5:'easy', 6:'rest'}, records: {}
            });

            const [logDate, setLogDate] = useState(() => getLocalDateStr(new Date()));
            
            const activeDateObj = new Date(logDate + 'T12:00:00');
            const activeDateStr = activeDateObj.toDateString();
            
            const [daily, setDaily] = useState(prof.records?.[activeDateStr] || { 
                w: 0, 
                b: false, 
                l: false, 
                s: false, 
                d: false, 
                ex: [false, false, false, false], 
                rLog: false, 
                activities: [], 
                tss: 0, 
                rReadinessChecked: false, 
                rSleep: 0, 
                rHrv: 0, 
                rReadinessScore: 100,
                skipReason: 'none' 
            });
            
            const [inAct, setInAct] = useState('Run');
            const [inDist, setInDist] = useState('');
            const [inPace, setInPace] = useState('');
            const [inHr, setInHr] = useState('');
            const [inCadence, setInCadence] = useState('');
            const [inElevation, setInElevation] = useState('');
            const [inDuration, setInDuration] = useState('');
            
            useEffect(() => {
                setInDist(''); setInPace(''); setInHr(''); setInCadence(''); setInElevation(''); setInDuration('');
            }, [activeDateStr]);
            
            const [leaderboardData, setLeaderboardData] = useState([]);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', safeName);

            const raceDateObj = new Date(prof.raceDate || '2026-11-15');
            const planStart = new Date(raceDateObj);
            planStart.setDate(planStart.getDate() - 168);
            
            const diffDays = Math.ceil((activeDateObj - planStart)/(1000*3600*24));
            const weekIdx = Math.max(0, Math.min(23, Math.ceil(diffDays/7)-1));
            
            const realDiffDays = Math.ceil((new Date() - planStart)/(1000*3600*24));
            const progressPct = Math.max(0, Math.min(100, (realDiffDays / 168) * 100));
            
            const daysLeft = Math.ceil((raceDateObj - activeDateObj)/(1000*3600*24));

            useEffect(() => {
                if(!prof.initialWeight) setShowSetup(true); 
                const unsub = onSnapshot(docRef, snap => {
                    if(snap.exists()) {
                        const d = snap.data();
                        setProf(prev => ({...prev, ...d}));
                        if(!d.isSetupComplete) setShowSetup(true); 
                    }
                });
                
                const boardRef = collection(db, 'artifacts', appId, 'public', 'data', 'profiles');
                const unsubBoard = onSnapshot(boardRef, snap => {
                    let arr = [];
                    const last7 = Array.from({length:7}, (_,i) => { let d = new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });
                    snap.forEach(docSnap => {
                        const data = docSnap.data(); const userName = docSnap.id;
                        let wKm = 0, tKm = 0;
                        if(data.records) {
                            last7.forEach(dt => { 
                                const rec = data.records[dt];
                                if(rec?.rLog) {
                                    let acts = rec.activities || [];
                                    if(acts.length === 0 && rec.rDist) acts = [{type: rec.rType, dist: rec.rDist}];
                                    acts.forEach(a => { if(a.type === 'Run' || a.type === 'Trail') wKm += (parseFloat(a.dist)||0); });
                                }
                            });
                            Object.values(data.records).forEach(rec => { 
                                if(rec?.rLog) {
                                    let acts = rec.activities || [];
                                    if(acts.length === 0 && rec.rDist) acts = [{type: rec.rType, dist: rec.rDist}];
                                    acts.forEach(a => { if(a.type === 'Run' || a.type === 'Trail') tKm += (parseFloat(a.dist)||0); });
                                }
                            });
                        }
                        arr.push({ name: userName.toUpperCase(), wKm, tKm });
                    });
                    arr.sort((a, b) => b.wKm - a.wKm);
                    setLeaderboardData(arr);
                });

                return () => { unsub(); unsubBoard(); };
            }, []);

            useEffect(() => {
                if (prof.records) {
                    setDaily(prof.records[activeDateStr] || { 
                        w: 0, 
                        b: false, 
                        l: false, 
                        s: false, 
                        d: false, 
                        ex: [false, false, false, false], 
                        rLog: false, 
                        activities: [], 
                        tss: 0, 
                        rReadinessChecked: false, 
                        rSleep: 0, 
                        rHrv: 0, 
                        rReadinessScore: 100,
                        skipReason: 'none'
                    });
                }
            }, [activeDateStr, prof.records]);

            const updateDaily = (key, val) => {
                const updates = typeof key === 'object' ? key : { [key]: val };
                const nd = {...daily, ...updates};
                setDaily(nd);
                const nRecords = {...prof.records, [activeDateStr]: nd};
                setProf(p => ({...p, records: nRecords})); 
                setDoc(docRef, { records: nRecords }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, records: nRecords}));
            };

            const updateSchedule = (newSchedule) => {
                const nProf = {...prof, schedule: newSchedule};
                setProf(nProf);
                setDoc(docRef, { schedule: newSchedule }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify(nProf));
            };
            
            const clearActivities = () => {
                if(window.confirm(lang === 'th' ? "ลบประวัติการซ้อมของวันนี้ทั้งหมด?" : "Clear all activities for today?")) {
                    const nd = { ...daily, rLog: false, activities: [], tss: 0, rDist:'', rPace:'', rHr:'', rType:'' };
                    setDaily(nd);
                    const nRecords = {...prof.records, [activeDateStr]: nd};
                    const nProf = {...prof, records: nRecords};
                    setProf(nProf);
                    setDoc(docRef, { records: nRecords }, {merge:true});
                    safeStorage.setItem(localKey, JSON.stringify(nProf));
                }
            };

            const saveRun = () => {
                const isRunOrTrail = inAct === 'Run' || inAct === 'Trail';
                const rSecs = isRunOrTrail ? parsePace(inPace) : 0; 
                const dNum = parseFloat(inDist) || 0;
                
                let currentVcr = prof.vcr || 4500; let upgraded = false;
                if (isRunOrTrail && rSecs !== Infinity && dNum >= 3 && inAct === 'Run') {
                    const equiv = (1800 / rSecs) * 1000;
                    if (equiv > currentVcr + 100) { currentVcr = Math.round(equiv); upgraded = true; }
                }
                
                let prevDate = new Date(activeDateObj);
                prevDate.setDate(prevDate.getDate() - 1);
                
                const prevSkipReasonActive = prof.records?.[prevDate.toDateString()]?.skipReason || (prof.records?.[prevDate.toDateString()]?.isSick ? 'sick' : 'none');

                const activeReadiness = daily.rReadinessChecked ? daily.rReadinessScore : 100;
                const activeSleep = daily.rReadinessChecked ? daily.rSleep : 420;
                
                const cfgToday = getDayConfig(activeDateObj, weekIdx, false, prof, isHotWeather, prevSkipReasonActive, activeReadiness, activeSleep, lang);
                
                const ai = generateFeedback(dNum, inPace, inHr, cfgToday.pace, inAct, inCadence, inElevation, inDuration, lang);
                const perf = calcCondition(inHr, inPace);
                
                const hrNum = Number(inHr) || prof.rhr || 60;
                const maxHr = 220 - (prof.age || 35);
                const intensity = hrNum / maxHr;
                
                const runMinutes = isRunOrTrail ? (dNum * (rSecs / 60)) : (parseFloat(inDuration) || 0);
                const todayTss = Math.round(runMinutes * intensity * 1.5); 
                
                let currentActs = daily.activities || [];
                if (currentActs.length === 0 && daily.rLog && daily.rDist) {
                    currentActs.push({
                        id: 'legacy', type: daily.rType, dist: daily.rDist, pace: daily.rPace, hr: daily.rHr,
                        cadence: daily.rCadence, elevation: daily.rElevation, duration: daily.rDuration,
                        aiFeedback: daily.aiFeedback, perfCondition: daily.perfCondition, tss: daily.tss || 0
                    });
                }
                
                const newAct = {
                    id: Date.now(), type: inAct, dist: inDist, pace: inPace, hr: inHr, cadence: inCadence,
                    elevation: inElevation, duration: inDuration, aiFeedback: ai, perfCondition: perf, tss: todayTss
                };
                currentActs = [...currentActs, newAct];
                
                const totalDayTss = currentActs.reduce((sum, a) => sum + (a.tss || 0), 0);

                const nd = {
                    ...daily, rLog: true, activities: currentActs, tss: totalDayTss,
                    vcrUpgraded: upgraded || daily.vcrUpgraded, newVcrVal: currentVcr || daily.newVcrVal
                };
                
                setDaily(nd);
                const nProf = {...prof, vcr: currentVcr, records: {...prof.records, [activeDateStr]: nd}};
                setProf(nProf);
                setDoc(docRef, { vcr: currentVcr, records: nProf.records }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify(nProf));
                
                setInDist(''); setInPace(''); setInHr(''); setInCadence(''); setInElevation(''); setInDuration('');
            };

            const updateWeight = (amt) => {
                const w = Number((prof.weight + amt).toFixed(1));
                setProf(p => ({...p, weight: w}));
                setDoc(docRef, { weight: w }, {merge:true});
                safeStorage.setItem(localKey, JSON.stringify({...prof, weight: w}));
            };

            const handleShare = async () => {
                const shareData = { title: 'ULTIMATE PACE', text: 'มาซ้อมวิ่งกับโค้ช AI ใน ULTIMATE PACE ด้วยกัน!', url: window.location.href };
                if (navigator.share) {
                    try { await navigator.share(shareData); } catch (err) { console.error('Share failed', err); }
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = window.location.href;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); setToastMessage('🔗 คัดลอกลิ้งก์สำเร็จ!'); setShowToast(true); setTimeout(() => setShowToast(false), 4000); } 
                    catch (err) { setToastMessage('❌ ไม่สามารถคัดลอกลิ้งก์ได้'); setShowToast(true); setTimeout(() => setShowToast(false), 4000); }
                    document.body.removeChild(textArea);
                }
            };

            let prevDateActive = new Date(activeDateObj);
            prevDateActive.setDate(prevDateActive.getDate() - 1);
            const prevSkipReasonActive = prof.records?.[prevDateActive.toDateString()]?.skipReason || (prof.records?.[prevDateActive.toDateString()]?.isSick ? 'sick' : 'none');
            
            const activeReadiness = daily.rReadinessChecked ? daily.rReadinessScore : 100;
            const activeSleep = daily.rReadinessChecked ? daily.rSleep : 420;

            const cfg = getDayConfig(activeDateObj, weekIdx, daysLeft <= 0, prof, isHotWeather, prevSkipReasonActive, activeReadiness, activeSleep, lang);

            let tDist = 0, tSecs = 0, f5k = Infinity, f10k = Infinity, longestRun = 0, maxStreakCount = 0, streakCount = 0, maxAquaCount = 0, aquaCount = 0;
            let totalTss7Days = 0;
            
            const last7DaysStrings = Array.from({length:7}, (_,i) => { 
                let d = new Date(activeDateObj); 
                d.setDate(d.getDate()-i); 
                return d.toDateString(); 
            });

            const sortedDates = Object.keys(prof.records || {}).sort((a,b)=>new Date(a)-new Date(b));
            sortedDates.forEach(dt => {
                const r = prof.records[dt];
                if(r.rLog) {
                    let acts = r.activities || [];
                    if(acts.length === 0 && r.rDist) acts = [{type: r.rType || 'Run', dist: r.rDist, pace: r.rPace}];
                    
                    let didLogSomething = false;
                    acts.forEach(act => {
                        if(act.type === 'Run' || act.type === 'Trail' || !act.type) {
                            const d = parseFloat(act.dist), s = parsePace(act.pace);
                            if(!isNaN(d) && isFinite(s)) {
                                tDist += d; tSecs += (s*d);
                                if(d>=5 && s<f5k) f5k = s; if(d>=10 && s<f10k) f10k = s;
                                if(d>longestRun) longestRun = d;
                            }
                        }
                        didLogSomething = true;
                    });
                    if(didLogSomething) streakCount++;
                } else {
                    streakCount = 0;
                }
                
                if(streakCount > maxStreakCount) maxStreakCount = streakCount;
                if(r.w >= 8) aquaCount++; else aquaCount = 0;
                if(aquaCount > maxAquaCount) maxAquaCount = aquaCount;

                if (last7DaysStrings.includes(dt)) {
                    totalTss7Days += (r.tss || 0);
                }
            });

            const achievements = { halfMarathon: longestRun >= 21.1, streakMaster: maxStreakCount >= 7, aquaMan: maxAquaCount >= 3 };
            
            let bestMin = (prof.vcr || 4500) / 30;
            if (f5k !== Infinity) bestMin = Math.max(bestMin, 1000 / (f5k / 60));
            if (f10k !== Infinity) bestMin = Math.max(bestMin, 1000 / (f10k / 60));
            let vo2Value = parseFloat(((bestMin * 0.2) + 3.5).toFixed(1));

            let pTime = "NEED DATA", pSource = "Run 5K to unlock";
            if(f10k !== Infinity) { pTime = calcPredictor(f10k*10, 10, prof.targetDist).str; pSource = "Fastest 10K Record"; }
            else if(f5k !== Infinity) { pTime = calcPredictor(f5k*5, 5, prof.targetDist).str; pSource = "Fastest 5K Record"; }

            const targetWater = getTargetWater(prof.lifestyle);
            let score = 0;
            if(daily.b) score+=10; if(daily.l) score+=10; if(daily.s) score+=10; if(daily.d) score+=10;
            if(daily.w >= targetWater) score+=20; else score += Math.round((daily.w / targetWater) * 20);
            score += Math.round(((daily.ex||[]).filter(Boolean).length / cfg.ex.length) * 40);

            const [showConfetti, setShowConfetti] = useState(false);
            useEffect(() => { if (score === 100) { setShowConfetti(true); setTimeout(() => setShowConfetti(false), 5000); } }, [score]);

            return (
                <div className="min-h-screen bg-[#000000] p-5 pb-32 relative overflow-x-hidden">
                    {showConfetti && <Confetti />}
                    {showSetup && <SetupModal initialProf={prof} onSave={(d)=>{ const finalD = {...prof, ...d, isSetupComplete: true}; setProf(finalD); setDoc(docRef, finalD); safeStorage.setItem(localKey, JSON.stringify(finalD)); setShowSetup(false);}} onCancel={()=> prof.initialWeight && setShowSetup(false)} lang={lang} />}
                    
                    {showToast && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-50 bg-[#bef264] text-black px-6 py-3 rounded-full font-black text-xs md:text-sm uppercase tracking-widest shadow-[0_0_20px_rgba(190,242,100,0.4)] transition-all">
                            {toastMessage}
                        </div>
                    )}

                    <header className="flex justify-between items-start mb-8 pt-4 gap-4">
                        <div className="flex-1">
                            <p className="text-zinc-400 font-black text-[10px] md:text-xs tracking-[0.2em] md:tracking-[0.3em] uppercase mb-2">{t.targetRaceDay}</p>
                            <h1 className="text-4xl md:text-5xl font-black text-white tracking-tighter uppercase italic leading-none md:leading-tight mb-2">ULTIMATE <br className="sm:hidden" /><span className="suunto-accent">PACE</span></h1>
                            <p className="text-xs md:text-sm font-bold text-zinc-400 mt-2 tracking-widest uppercase">{t.runner} <span className="text-white">{profileName}</span></p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-2 shrink-0">
                            <button onClick={toggleLang} className="suunto-card p-3 w-14 h-14 md:p-4 md:w-16 md:h-16 flex flex-col items-center justify-center active:scale-95 transition-transform hover:bg-zinc-800">
                                <span className="text-sm md:text-base font-black text-white">{lang === 'th' ? 'EN' : 'TH'}</span>
                                <span className="text-[9px] md:text-[10px] font-black uppercase text-zinc-500">LANG</span>
                            </button>

                            <button onClick={handleShare} className="suunto-card p-3 w-14 h-14 md:p-4 md:w-16 md:h-16 flex flex-col items-center justify-center active:scale-95 transition-transform hover:bg-zinc-800">
                                <svg className="w-5 h-5 md:w-6 md:h-6 text-cyan-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                                </svg>
                                <span className="text-[9px] md:text-[10px] font-black uppercase text-cyan-400">{t.share}</span>
                            </button>
                            <button onClick={onLogout} className="suunto-card p-3 w-14 h-14 md:p-4 md:w-16 md:h-16 flex flex-col items-center justify-center active:scale-95 transition-transform hover:bg-zinc-800">
                                <svg className="w-5 h-5 md:w-6 md:h-6 text-zinc-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg>
                                <span className="text-[9px] md:text-[10px] font-black uppercase text-zinc-400">{t.exit}</span>
                            </button>
                        </div>
                    </header>

                    <div className="mb-8">
                        <div className="flex justify-between text-xs font-black text-zinc-400 uppercase tracking-widest mb-2">
                            <span>{t.planStarted}</span>
                            <span className={daysLeft <= 0 ? 'text-red-500' : 'text-zinc-400'}>{daysLeft > 0 ? `${daysLeft} ${t.daysLeft}` : t.raceDay}</span>
                        </div>
                        <div className="w-full h-3 bg-[#18181b] rounded-full overflow-hidden border border-zinc-800">
                            <div className="h-full suunto-bg-accent transition-all duration-1000" style={{width: `${progressPct}%`}}></div>
                        </div>
                    </div>

                    <div className="suunto-card p-6 md:p-8 mb-8 relative overflow-hidden">
                        <div className="relative z-10">
                            <div className="mb-4 inline-block relative z-20">
                                <span className="bg-[#18181b] text-zinc-200 border border-zinc-700 px-3 py-1.5 md:px-4 md:py-2 rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest shadow-md">{cfg.name}</span>
                            </div>

                            <button onClick={()=>setShowSetup(true)} className="flex items-center gap-2 mb-4 group relative z-20">
                                <span className="text-zinc-400 font-black text-xs md:text-sm uppercase tracking-widest group-hover:text-white transition-colors">
                                    {prof.primaryGoal === 'weight_loss' ? `${t.weightTarget} ${prof.targetWeight} KG)` : t.currentWeight}
                                </span>
                                <svg className="w-4 h-4 md:w-5 md:h-5 text-zinc-500 group-hover:text-white transition-colors shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                            
                            <div className={`flex items-baseline gap-3 relative z-20 ${prof.primaryGoal === 'weight_loss' ? 'mb-8' : 'mb-2'}`}>
                                <span className="text-7xl font-black text-white italic tracking-tighter">{prof.weight}</span>
                                <span className="text-zinc-400 font-bold text-2xl uppercase tracking-widest">KG</span>
                            </div>
                            
                            {prof.primaryGoal === 'weight_loss' && (
                                <div className="flex gap-3 w-[150px] relative z-20">
                                    <button onClick={()=>updateWeight(0.1)} className="flex-1 h-14 bg-[#1e1e1e] rounded-xl text-zinc-300 font-black text-2xl active:scale-95 border border-zinc-700 hover:bg-zinc-800">+</button>
                                    <button onClick={()=>updateWeight(-0.1)} className="flex-1 h-14 suunto-bg-accent rounded-xl text-black font-black text-3xl active:scale-95 pb-1">-</button>
                                </div>
                            )}
                        </div>
                        <div className="absolute bottom-[-20px] right-[-10px] sm:right-2 z-0 opacity-80 scale-[1.15] sm:scale-125 origin-bottom-right">
                            <EliteAvatar activity={cfg.id} />
                        </div>
                    </div>

                    <nav className="flex gap-3 mb-8">
                        {[ {id:'tracker', label: t.track}, {id:'plan', label: t.plan}, {id:'ranking', label: t.rank}, {id:'stats', label: t.data} ].map(tab => (
                            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} 
                                className={`flex-1 py-5 rounded-xl font-black text-xs md:text-sm tracking-widest uppercase transition-all border-2 ${activeTab===tab.id ? 'suunto-bg-accent border-[#bef264]' : 'bg-[#121212] border-zinc-800 text-zinc-400 hover:bg-[#1e1e1e]'}`}>
                                {tab.label}
                            </button>
                        ))}
                    </nav>

                    <main className="animate-in fade-in duration-300">
                        {activeTab === 'tracker' && <TabTracker score={score} daily={daily} updateDaily={updateDaily} clearActivities={clearActivities} cfg={cfg} inDist={inDist} setInDist={setInDist} inPace={inPace} setInPace={setInPace} inHr={inHr} setInHr={setInHr} inCadence={inCadence} setInCadence={setInCadence} inElevation={inElevation} setInElevation={setInElevation} inDuration={inDuration} setInDuration={setInDuration} inAct={inAct} setInAct={setInAct} saveRun={saveRun} targetWater={targetWater} isHotWeather={isHotWeather} setIsHotWeather={setIsHotWeather} lang={lang} logDate={logDate} setLogDate={setLogDate} />}
                        {activeTab === 'plan' && <TabPlan cfg={cfg} prof={prof} weekIdx={weekIdx} isHotWeather={isHotWeather} updateDaily={updateDaily} updateSchedule={updateSchedule} activeDateStr={activeDateStr} activeDateObj={activeDateObj} lang={lang} />}
                        {activeTab === 'ranking' && <TabRanking leaderboardData={leaderboardData} lang={lang} />}
                        {activeTab === 'stats' && <TabStats prof={prof} vo2Value={vo2Value} tDist={tDist} pTime={pTime} pSource={pSource} fastest5kSecs={f5k} fastest10kSecs={f10k} longestRun={longestRun} achievements={achievements} currentTss={totalTss7Days} lang={lang} activeDateObj={activeDateObj} />}
                    </main>
                </div>
            );
        };

        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentUser, setCurrentUser] = useState(() => safeStorage.getItem('p80_user_v16_suunto'));

            useEffect(() => {
                signInAnonymously(auth).catch(e => console.error(e));
                const unsub = onAuthStateChanged(auth, u => { setUser(u); setLoading(false); });
                return unsub;
            }, []);

            if (loading) return <div className="min-h-screen bg-black flex items-center justify-center"><p className="suunto-accent font-black tracking-widest uppercase animate-pulse text-lg">SYNCING SATELLITE...</p></div>;
            if (!user || !currentUser) return <LoginScreen onLogin={n=>{setCurrentUser(n); safeStorage.setItem('p80_user_v16_suunto', n);}} />;
            return <Dashboard profileName={currentUser} onLogout={()=>{setCurrentUser(null); safeStorage.removeItem('p80_user_v16_suunto'); window.location.reload();}} />;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><MainApp /></ErrorBoundary>);
    </script>
</body>
</html>
