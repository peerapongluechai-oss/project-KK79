<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>แก้วกล้วย Cost App</title>

  <!-- นำเข้า Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- นำเข้า React.js -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

  <!-- นำเข้า Babel (ตัวแปลภาษาให้เบราว์เซอร์อ่าน React ออก) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <!-- นำเข้า FontAwesome Icons (สำหรับใช้งานบนเว็บจริง) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { background-color: #FDF9F1; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 8px); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .strike-transition { transition: all 0.2s ease-in-out; }
    
    /* หน้าจอโหลดข้อมูล */
    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #b45309;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #fde68a;
      border-top: 4px solid #d97706;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- จุดที่แอปจะแสดงผล (มีหน้าจอโหลดดักไว้ก่อน หาก React ยังโหลดไม่เสร็จ) -->
  <div id="root">
    <div id="loading-screen">
      <div class="spinner"></div>
      <h2 style="font-weight: bold; font-size: 1.2rem;">กำลังเตรียมครัว...</h2>
      <p style="font-size: 0.8rem; color: #78716c; margin-top: 8px;">หากค้างเกิน 5 วินาที กรุณารีเฟรชหน้าเว็บ</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const defaultItems = [
      { id: 1, category: '1. กล้วยแก้วใส 2 สี', name: 'กล้วยน้ำว้า (มะลิอ่อง)', spec: 'สวนชลบุรี/ฉะเชิงเทรา', price: 40, totalQty: 15, unit: 'ลูก', usedQty: 1.5, checked: false },
      { id: 2, category: '1. กล้วยแก้วใส 2 สี', name: 'แป้งมัน (เหรียญทองคู่)', spec: 'ถุง 500g', price: 35, totalQty: 500, unit: 'กรัม', usedQty: 30, checked: false },
      { id: 3, category: '1. กล้วยแก้วใส 2 สี', name: 'แป้งท้าว (ปลามังกร)', spec: 'ถุง 500g', price: 40, totalQty: 500, unit: 'กรัม', usedQty: 10, checked: false },
      { id: 4, category: '1. กล้วยแก้วใส 2 สี', name: 'ดอกอัญชัน', spec: 'สด/แห้ง', price: 20, totalQty: 100, unit: 'กรัม', usedQty: 2, checked: false },
      { id: 5, category: '1. กล้วยแก้วใส 2 สี', name: 'เกลือป่น', spec: 'สำหรับแช่กล้วย', price: 10, totalQty: 500, unit: 'กรัม', usedQty: 5, checked: false },
      { id: 18, category: '1. กล้วยแก้วใส 2 สี', name: 'น้ำมะพร้าวน้ำหอมแท้', spec: 'สำหรับต้มหล่อกล้วย', price: 50, totalQty: 1000, unit: 'ml', usedQty: 50, checked: false },
      
      { id: 6, category: '2. กะทิคาราเมลทองคำ', name: 'หัวกะทิ (Amphawa)', spec: 'ขวด PET 250ml', price: 25, totalQty: 250, unit: 'ml', usedQty: 40, checked: false },
      { id: 7, category: '2. กะทิคาราเมลทองคำ', name: 'น้ำตาลช่อดอกมะพร้าว', spec: 'Cobie Brown (Low GI)', price: 150, totalQty: 500, unit: 'กรัม', usedQty: 15, checked: false },
      { id: 8, category: '2. กะทิคาราเมลทองคำ', name: 'น้ำตาลโตนดแท้ 100%', spec: 'ตาลบุรี', price: 80, totalQty: 500, unit: 'กรัม', usedQty: 5, checked: false },
      { id: 9, category: '2. กะทิคาราเมลทองคำ', name: 'ใบเตยหอม', spec: 'กำ (ตลาดใหม่)', price: 15, totalQty: 100, unit: 'กรัม', usedQty: 5, checked: false },
      { id: 10, category: '2. กะทิคาราเมลทองคำ', name: 'เนื้อมะพร้าวอ่อนแช่แข็ง', spec: 'Makro (1kg)', price: 180, totalQty: 1000, unit: 'กรัม', usedQty: 25, checked: false },
      
      { id: 11, category: '3. ซูเปอร์ครัมเบิ้ลคั่ว', name: 'มะพร้าวอบแห้ง', spec: 'Aro / Imperial', price: 120, totalQty: 1000, unit: 'กรัม', usedQty: 8, checked: false },
      { id: 19, category: '3. ซูเปอร์ครัมเบิ้ลคั่ว', name: 'อัลมอนด์สไลซ์/ธัญพืช', spec: 'อบกรอบ (Healthy)', price: 150, totalQty: 500, unit: 'กรัม', usedQty: 5, checked: false },
      { id: 12, category: '3. ซูเปอร์ครัมเบิ้ลคั่ว', name: 'เนยสดจืด', spec: 'Allowrie (227g)', price: 120, totalQty: 227, unit: 'กรัม', usedQty: 2, checked: false },
      { id: 13, category: '3. ซูเปอร์ครัมเบิ้ลคั่ว', name: 'น้ำตาลทรายเกล็ดเล็ก', spec: 'มิตรผล', price: 25, totalQty: 1000, unit: 'กรัม', usedQty: 2, checked: false },
      
      { id: 14, category: '4. ไอศกรีม & แพ็กเกจจิ้ง', name: 'ไอศกรีมกะทิสด (Dairy-Free)', spec: 'ถัง 3kg (~60 Scoop)', price: 350, totalQty: 60, unit: 'สกู๊ป', usedQty: 1, checked: false },
      { id: 15, category: '4. ไอศกรีม & แพ็กเกจจิ้ง', name: 'ถ้วยพลาสติกใสทรงแบน', spec: 'พร้อมฝาโดม (50 ชุด)', price: 150, totalQty: 50, unit: 'ใบ', usedQty: 1, checked: false },
      { id: 16, category: '4. ไอศกรีม & แพ็กเกจจิ้ง', name: 'ช้อนตักขนม', spec: 'สีดำพรีเมียม (50 คัน)', price: 40, totalQty: 50, unit: 'คัน', usedQty: 1, checked: false },
      { id: 17, category: '4. ไอศกรีม & แพ็กเกจจิ้ง', name: 'สติกเกอร์โลโก้', spec: 'สั่งทำ (100 ดวง)', price: 50, totalQty: 100, unit: 'ดวง', usedQty: 1, checked: false },
    ];

    const defaultEquipments = [
      { id: 1, name: 'โต๊ะพับหน้าขาว', spec: 'ขนาด 120x60 cm', price: 800, qty: 1, checked: false },
      { id: 2, name: 'เตาแก๊สปิกนิก + แก๊สกระป๋อง', spec: 'สำหรับตั้งหน้าบ้าน', price: 600, qty: 1, checked: false },
      { id: 3, name: 'หม้อต้มสเตนเลส', spec: 'สำหรับต้มกล้วย/กะทิ', price: 300, qty: 2, checked: false },
      { id: 4, name: 'กระทะเทฟลอน + พาย', spec: 'สำหรับคั่วครัมเบิ้ล', price: 450, qty: 1, checked: false },
      { id: 5, name: 'ถาดพลาสติก + กระดาษไข', spec: 'พักวัตถุดิบ / ครัมเบิ้ล', price: 150, qty: 1, checked: false },
      { id: 6, name: 'ป้ายไวนิล / สแตนดี้', spec: 'ตกแต่งหน้าร้าน', price: 500, qty: 1, checked: false },
      { id: 7, name: 'ขวดสเปรย์ (Foggy)', spec: 'Food Grade (พรมน้ำ/อัญชัน)', price: 25, qty: 2, checked: false },
      { id: 8, name: 'กะละมังผสมสเตนเลส', spec: 'ก้นลึก (สำหรับคลุกกล้วย)', price: 150, qty: 2, checked: false }
    ];

    function App() {
      // 1. ระบบโหลดข้อมูล (เปลี่ยนรหัสตัวแปรเป็น v7 เพื่อล้างความจำเก่าทั้งหมด)
      const [sellingPrice, setSellingPrice] = useState(() => {
        try {
          const saved = localStorage.getItem('mj_app_v7_price');
          return saved ? JSON.parse(saved) : 89; 
        } catch (e) { return 89; }
      });
      
      const [activeTab, setActiveTab] = useState('recipe'); 
      
      const [items, setItems] = useState(() => {
        try {
          const saved = localStorage.getItem('mj_app_v7_items');
          if (saved) {
            const parsed = JSON.parse(saved);
            return Array.isArray(parsed) ? parsed : defaultItems;
          }
          return defaultItems;
        } catch (e) { return defaultItems; }
      });

      const [equipments, setEquipments] = useState(() => {
        try {
          const saved = localStorage.getItem('mj_app_v7_equip');
          if (saved) {
            const parsed = JSON.parse(saved);
            return Array.isArray(parsed) ? parsed : defaultEquipments;
          }
          return defaultEquipments;
        } catch (e) { return defaultEquipments; }
      });

      // 2. ระบบเซฟข้อมูลอัตโนมัติแบบปลอดภัย
      useEffect(() => { 
        try { localStorage.setItem('mj_app_v7_price', JSON.stringify(sellingPrice)); } catch (e) {}
      }, [sellingPrice]);

      useEffect(() => { 
        try { localStorage.setItem('mj_app_v7_items', JSON.stringify(items)); } catch (e) {}
      }, [items]);

      useEffect(() => { 
        try { localStorage.setItem('mj_app_v7_equip', JSON.stringify(equipments)); } catch (e) {}
      }, [equipments]);

      // 3. ฟังก์ชันจัดการข้อมูล
      const handleInputChange = (id, field, value) => {
        setItems((items || []).map(item => item.id === id ? { ...item, [field]: ['name', 'spec', 'unit'].includes(field) ? value : (value === '' ? '' : Number(value)) } : item));
      };

      const addNewItem = (category) => {
        const safeItems = items || [];
        const newId = safeItems.length > 0 ? Math.max(...safeItems.map(i => i.id)) + 1 : 1;
        setItems([...safeItems, { id: newId, category: category, name: 'วัตถุดิบใหม่...', spec: 'รายละเอียด', price: 0, totalQty: 1, unit: 'หน่วย', usedQty: 0, checked: false }]);
      };

      const deleteItem = (id) => setItems((items || []).filter(item => item.id !== id));

      const handleEquipChange = (id, field, value) => {
        setEquipments((equipments || []).map(item => item.id === id ? { ...item, [field]: ['name', 'spec'].includes(field) ? value : (value === '' ? '' : Number(value)) } : item));
      };

      const addEquipItem = () => {
        const safeEquips = equipments || [];
        const newId = safeEquips.length > 0 ? Math.max(...safeEquips.map(i => i.id)) + 1 : 1;
        setEquipments([...safeEquips, { id: newId, name: 'อุปกรณ์ใหม่...', spec: 'รายละเอียด', price: 0, qty: 1, checked: false }]);
      };

      const deleteEquipItem = (id) => setEquipments((equipments || []).filter(item => item.id !== id));

      const toggleCheckItem = (id) => setItems((items || []).map(item => item.id === id ? { ...item, checked: !item.checked } : item));
      const toggleCheckEquip = (id) => setEquipments((equipments || []).map(item => item.id === id ? { ...item, checked: !item.checked } : item));

      const resetShoppingList = () => {
        setItems((items || []).map(item => ({ ...item, checked: false })));
        setEquipments((equipments || []).map(item => ({ ...item, checked: false })));
      };

      // 4. ระบบคำนวณต้นทุน
      const calculateCost = (price, totalQty, usedQty) => (!price || !totalQty || !usedQty) ? 0 : (price / totalQty) * usedQty;
      const totalCost = (items || []).reduce((sum, item) => sum + calculateCost(item.price, item.totalQty, item.usedQty), 0);
      const profit = sellingPrice - totalCost;
      const margin = (profit / sellingPrice) * 100;
      const totalEquipCost = (equipments || []).reduce((sum, item) => sum + (item.price * item.qty), 0);
      const breakEvenCups = profit > 0 ? Math.ceil(totalEquipCost / profit) : 0;

      const groupedItems = (items || []).reduce((acc, item) => {
        if (!item.category) return acc;
        if (!acc[item.category]) acc[item.category] = [];
        acc[item.category].push(item);
        return acc;
      }, {});

      const allShoppingItems = [...(items || []), ...(equipments || [])];
      const checkedCount = allShoppingItems.filter(item => item && item.checked).length;
      const progressPercent = allShoppingItems.length > 0 ? (checkedCount / allShoppingItems.length) * 100 : 0;

      // 5. ส่วนแสดงผล (UI)
      return (
        <div className="min-h-screen bg-[#FDF9F1] pb-24 font-sans text-stone-800">
          {/* ส่วนหัวแอป */}
          <div className="bg-gradient-to-r from-amber-600 to-orange-500 text-white p-5 shadow-lg sticky top-0 z-10 rounded-b-[2rem]">
            <div className="flex justify-between items-center mb-1">
              <h1 className="text-xl font-bold flex items-center tracking-wide">
                <i className="fa-solid fa-fire-burner text-2xl mr-2 opacity-90"></i>
                แก้วกล้วย <span className="font-light text-amber-100 ml-1">Bistro</span>
              </h1>
              <div className="bg-white/20 backdrop-blur-sm text-[10px] px-3 py-1.5 rounded-full font-medium border border-white/30 flex items-center">
                <span className="w-2 h-2 rounded-full bg-green-400 mr-1.5 animate-pulse"></span>
                ออนไลน์
              </div>
            </div>
            <p className="text-amber-100 text-xs pl-8">ระบบคำนวณต้นทุน & คู่มือสูตรอาหาร</p>
          </div>

          <div className="p-4 max-w-md mx-auto w-full">
            
            {/* TAB 1: DASHBOARD (ภาพรวมร้าน) */}
            {activeTab === 'dashboard' && (
              <div className="space-y-5 pt-2">
                <div className="bg-gradient-to-br from-yellow-100 via-amber-50 to-orange-50 rounded-[2rem] shadow-sm p-6 border border-amber-200/60 relative overflow-hidden">
                  <div className="absolute -right-4 -top-4 w-24 h-24 bg-gradient-to-br from-amber-200/40 to-orange-200/40 rounded-full blur-xl"></div>
                  <div className="relative z-10">
                    <div className="flex justify-between items-center mb-2">
                      <p className="text-amber-800/80 text-sm font-medium flex items-center">
                        <i className="fa-solid fa-money-bill-wave text-base mr-1.5 text-amber-600"></i> ราคาขายต่อเสิร์ฟ (Selling Price)
                      </p>
                    </div>
                    <div className="flex items-baseline border-b border-amber-300/50 pb-2 w-max">
                      <span className="text-2xl text-amber-700 mr-1">฿</span>
                      <input type="number" value={sellingPrice} onChange={(e) => setSellingPrice(Number(e.target.value))} className="text-5xl font-black text-amber-900 bg-transparent focus:outline-none w-28 text-center" />
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-white rounded-3xl shadow-sm p-5 border border-stone-100 flex flex-col justify-center items-center text-center relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-orange-400 opacity-50"></div>
                    <i className="fa-solid fa-cart-shopping text-2xl text-orange-400 mb-2"></i>
                    <p className="text-stone-500 text-xs font-medium mb-1">ต้นทุนวัตถุดิบ (Cost)</p>
                    <p className="text-2xl font-bold text-stone-800">฿{totalCost.toFixed(2)}</p>
                  </div>
                  <div className="bg-white rounded-3xl shadow-sm p-5 border border-stone-100 flex flex-col justify-center items-center text-center relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-1 bg-green-400 opacity-50"></div>
                    <i className="fa-solid fa-percent text-2xl text-green-500 mb-2"></i>
                    <p className="text-stone-500 text-xs font-medium mb-1">มาร์จิ้น (Margin)</p>
                    <p className="text-2xl font-bold text-stone-800">{margin > 0 ? margin.toFixed(1) : 0}%</p>
                  </div>
                  <div className="col-span-2 bg-gradient-to-br from-green-600 to-emerald-500 rounded-3xl shadow-md p-6 text-white relative overflow-hidden">
                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                    <div className="relative z-10 flex justify-between items-center">
                      <div>
                        <p className="text-green-50 text-sm font-medium flex items-center mb-1"><i className="fa-solid fa-arrow-trend-up text-base mr-1.5"></i> กำไรสุทธิ (Net Profit)</p>
                        <p className="text-xs text-green-100/80">ต่อ 1 เสิร์ฟ</p>
                      </div>
                      <div className="text-right">
                        <p className="text-4xl font-black">฿{profit.toFixed(2)}</p>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-[2rem] shadow-sm p-6 border border-stone-100 mt-2 relative overflow-hidden">
                   <div className="absolute left-0 top-0 w-1.5 h-full bg-blue-400"></div>
                  <div className="flex justify-between items-start mb-5 pl-2">
                    <div>
                      <h3 className="text-stone-800 font-bold flex items-center text-lg"><i className="fa-solid fa-bullseye text-xl mr-1.5 text-blue-500"></i> เป้าหมายคืนทุน</h3>
                      <p className="text-xs text-stone-500 mt-1">ยอดขายเพื่อคืนทุนค่าอุปกรณ์เบื้องต้น</p>
                    </div>
                  </div>
                  <div className="flex items-center justify-between bg-stone-50 rounded-2xl p-4 border border-stone-100">
                    <div>
                      <p className="text-[10px] uppercase tracking-wider text-stone-400 font-bold mb-1">เงินลงทุนตั้งต้น</p>
                      <p className="text-xl font-bold text-stone-700">฿{totalEquipCost.toLocaleString()}</p>
                    </div>
                    <div className="h-10 w-px bg-stone-200"></div>
                    <div className="text-right">
                      <p className="text-[10px] uppercase tracking-wider text-stone-400 font-bold mb-1">ต้องขายให้ได้</p>
                      <p className="text-2xl font-black text-blue-600">{breakEvenCups.toLocaleString()} <span className="text-sm font-medium text-stone-500">ถ้วย</span></p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TAB 2: INGREDIENTS (จัดการวัตถุดิบ) */}
            {activeTab === 'ingredients' && (
              <div className="space-y-6 pt-2">
                <div className="flex justify-between items-end mb-2">
                  <div>
                    <h2 className="text-2xl font-black text-stone-800 tracking-tight">รายการวัตถุดิบ</h2>
                    <p className="text-sm text-amber-700/80 font-medium flex items-center mt-1"><i className="fa-solid fa-utensils text-base mr-1.5"></i> แก้ไขต้นทุนและปริมาณ</p>
                  </div>
                </div>

                {Object.keys(groupedItems).map((category, idx) => (
                  <div key={idx} className="space-y-4">
                    <div className="flex justify-between items-center border-b-2 border-stone-200 pb-2 mt-8">
                      <h3 className="font-bold text-stone-700 text-lg flex items-center">
                        <span className="w-2 h-6 bg-amber-500 rounded-full mr-2"></span> {category}
                      </h3>
                      <button onClick={() => addNewItem(category)} className="text-xs flex items-center text-amber-700 bg-amber-100 hover:bg-amber-200 transition-colors px-3 py-1.5 rounded-full font-bold shadow-sm">
                        <i className="fa-solid fa-circle-plus text-sm mr-1"></i> เพิ่ม
                      </button>
                    </div>

                    {groupedItems[category].map((item) => {
                      const cost = calculateCost(item.price, item.totalQty, item.usedQty);
                      return (
                        <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-stone-100 relative group">
                          <div className="flex justify-between items-start mb-4">
                            <div className="w-full pr-10">
                              <input type="text" value={item.name} onChange={(e) => handleInputChange(item.id, 'name', e.target.value)} className="font-bold text-stone-800 text-lg w-full bg-transparent border-b border-dashed border-transparent focus:border-amber-400 focus:outline-none transition-colors" placeholder="ชื่อวัตถุดิบ" />
                              <div className="flex items-center mt-1">
                                <i className="fa-solid fa-circle-info text-xs text-stone-400 mr-1"></i>
                                <input type="text" value={item.spec} onChange={(e) => handleInputChange(item.id, 'spec', e.target.value)} className="text-xs text-stone-500 w-full bg-transparent border-b border-dashed border-transparent focus:border-amber-400 focus:outline-none" placeholder="ยี่ห้อ/รายละเอียด" />
                              </div>
                            </div>
                            <button onClick={() => deleteItem(item.id)} className="absolute top-5 right-5 text-stone-300 hover:text-red-500 transition-colors p-1 bg-stone-50 rounded-full"><i className="fa-solid fa-trash text-base"></i></button>
                          </div>
                          <div className="grid grid-cols-2 gap-3 text-sm">

                                <div className="flex items-center">
                                  <input type="number" value={item.usedQty} onChange={(e) => handleInputChange(item.id, 'usedQty', e.target.value)} className="w-20 bg-transparent font-black text-amber-600 text-xl focus:outline-none" />
                                  <span className="text-sm font-medium text-amber-700/70">{item.unit}</span>
                                </div>
                              </div>

                                 <span className="text-2xl font-black text-amber-600">฿{cost.toFixed(2)}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      );

                  </div>
                ))}

                    <div className="divide-y divide-stone-50">
                      {groupedItems[category].map((item) => (
                        <div 
                          key={item.id} 
                          onClick={() => toggleCheckItem(item.id)}
                          className={`flex items-center p-4 cursor-pointer strike-transition hover:bg-stone-50 ${item.checked ? 'opacity-50' : ''}`}
                        >
                          <div className={`w-6 h-6 rounded-md flex items-center justify-center mr-4 shrink-0 transition-colors ${item.checked ? 'bg-green-500 text-white' : 'bg-stone-100 border-2 border-stone-300'}`}>
                            {item.checked && <i className="fa-solid fa-check font-bold"></i>}
                          </div>
                          <div className="flex-1">
                            <p className={`font-bold text-stone-800 ${item.checked ? 'line-through text-stone-400' : ''}`}>{item.name}</p>
                            <p className="text-xs text-stone-500">{item.spec}</p>
                          </div>
                          <div className="text-right">
                            <p className={`font-black text-amber-600 ${item.checked ? 'line-through text-stone-400' : ''}`}>{item.totalQty} {item.unit}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}

                {equipments.length > 0 && (

                      {equipments.map((item) => (

                          <div className={`w-6 h-6 rounded-md flex items-center justify-center mr-4 shrink-0 transition-colors ${item.checked ? 'bg-green-500 text-white' : 'bg-stone-100 border-2 border-stone-300'}`}>
                            {item.checked && <i className="fa-solid fa-check font-bold"></i>}
                          </div>
                          <div className="flex-1">
                            <p className={`font-bold text-stone-800 ${item.checked ? 'line-through text-stone-400' : ''}`}>{item.name}</p>
                            <p className="text-xs text-stone-500">{item.spec}</p>
                          </div>
                          <div className="text-right">
                            <p className={`font-black text-stone-600 ${item.checked ? 'line-through text-stone-400' : ''}`}>{item.qty} ชิ้น</p>
                          </div>
                        </div>

                    </div>
                  </div>

            {/* TAB 4: EQUIPMENT (อุปกรณ์) */}
            {activeTab === 'equipment' && (

                  <button onClick={addEquipItem} className="text-sm flex items-center text-white bg-stone-800 hover:bg-stone-700 transition-colors px-4 py-2 rounded-full font-bold shadow-md">

                  const itemTotal = item.price * item.qty;
                  return (
                    <div key={item.id} className="bg-white p-5 rounded-3xl shadow-sm border border-stone-200 relative">
                      <div className="flex justify-between items-start mb-4">
                        <div className="w-full pr-10">
                          <input type="text" value={item.name} onChange={(e) => handleEquipChange(item.id, 'name', e.target.value)} className="font-bold text-stone-800 text-lg w-full bg-transparent border-b border-dashed border-transparent focus:border-stone-400 focus:outline-none" placeholder="ชื่ออุปกรณ์" />
                          <input type="text" value={item.spec} onChange={(e) => handleEquipChange(item.id, 'spec', e.target.value)} className="text-xs text-stone-500 w-full bg-transparent border-b border-dashed border-transparent focus:border-stone-400 focus:outline-none mt-1" placeholder="รายละเอียด" />
                        </div>
                        <button onClick={() => deleteEquipItem(item.id)} className="absolute top-5 right-5 text-stone-300 hover:text-red-500 transition-colors bg-stone-50 p-1.5 rounded-full"><i className="fa-solid fa-trash text-base"></i></button>

                      <div className="flex items-center justify-between bg-stone-50 p-3 rounded-2xl border border-stone-100">
                        <div className="flex-1 border-r border-stone-200 pr-3">

                          <div className="flex items-center mt-1">
                            <span className="text-stone-400 mr-1 text-sm">฿</span>
                            <input type="number" value={item.price} onChange={(e) => handleEquipChange(item.id, 'price', e.target.value)} className="w-full bg-transparent font-black text-stone-700 text-lg focus:outline-none" />
                          </div>
                        </div>
                        <div className="flex-1 px-3">
                          <label className="text-[10px] text-stone-400 font-bold uppercase tracking-wider block">จำนวน</label>
                          <div className="flex items-center mt-1 text-stone-700">
                            <span className="text-sm mr-1 font-medium">x</span>
                            <input type="number" value={item.qty} onChange={(e) => handleEquipChange(item.id, 'qty', e.target.value)} className="w-full bg-transparent font-black text-lg focus:outline-none" />

                           <label className="text-[9px] text-stone-400 font-bold uppercase tracking-wider block mb-0.5">รวมเป็นเงิน</label>
                           <span className="text-lg font-black tracking-tight">฿{itemTotal.toLocaleString()}</span>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* TAB 5: RECIPE (สมุดสูตรลับ) */}
            {activeTab === 'recipe' && (
              <div className="space-y-6 pt-2">
                <div className="mb-6">
                  <h2 className="text-2xl font-black text-stone-800 tracking-tight">สมุดสูตรลับ (SOP)</h2>
                  <p className="text-sm text-stone-500 font-medium flex items-center mt-1">
                    <i className="fa-solid fa-book-open text-base mr-1.5 text-amber-600"></i> ขั้นตอนปฏิบัติมาตรฐานระดับเชฟ
                  </p>
                </div>

                {/* ส่วนที่ 1: กล้วยแก้วใส */}
                <div className="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden relative">
                  <div className="absolute top-0 left-0 w-2 h-full bg-yellow-400"></div>
                  <div className="px-5 py-4 border-b border-stone-50 flex items-center justify-between bg-yellow-50/50">
                    <h3 className="font-bold text-stone-800 text-lg ml-2">1. การทำกล้วยแก้วใส 2 สี</h3>
                    <span className="bg-yellow-100 text-yellow-800 text-[10px] px-2 py-1 rounded-full font-bold border border-yellow-200">หัวใจความหนึบ</span>
                  </div>
                  <div className="p-5 space-y-6 text-sm text-stone-700 bg-white">
                    <div className="flex items-start">
                      <span className="w-6 h-6 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center text-xs font-black mr-3 shrink-0 mt-0.5 shadow-sm">1</span>
                      <div className="w-full">
                        <p className="font-bold text-stone-800 mb-1 border-b border-stone-100 pb-1">การคัดเลือกและเตรียมกล้วย</p>
                        <ul className="list-disc pl-4 space-y-1 mt-2 text-stone-600 text-[13px]">
                          <li>ใช้กล้วยน้ำว้ามะลิอ่อง <span className="font-semibold text-stone-800">ความสุกระดับห่ามปนสุก</span> (เปลือกเหลืองแต่บีบแล้วยังแข็ง เนื้อในต้องไม่เละและไม่มีจุดดำ)</li>
                          <li>หั่นกล้วยเป็นลูกเต๋าขนาด <span className="font-semibold text-amber-700">1x1 ซม.</span> (ขนาดต้องเท่ากันเพื่อให้สุกพร้อมกัน)</li>
                          <li>นำกล้วยไปแช่น้ำเกลือ (อัตราส่วน: น้ำ 1 ลิตร + เกลือ 1 ช้อนโต๊ะ) นาน <span className="font-semibold">15 นาที</span> เพื่อล้างยางไม่ให้กล้วยดำ และลดความฝาด</li>
                          <li>ล้างด้วยน้ำเปล่าอีก 2 รอบ แล้วพักใส่ตะแกรงให้สะเด็ดน้ำ <span className="font-semibold text-red-500">100%</span> (ห้ามแฉะเด็ดขาด)</li>
                        </ul>
                      </div>
                    </div>
                    <div className="flex items-start">
                      <span className="w-6 h-6 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center text-xs font-black mr-3 shrink-0 mt-0.5 shadow-sm">2</span>
                      <div className="w-full">
                        <p className="font-bold text-stone-800 mb-1 border-b border-stone-100 pb-1">การผสมแป้งและการเตรียมสี</p>
                        <ul className="list-disc pl-4 space-y-1 mt-2 text-stone-600 text-[13px]">
                          <li><b className="text-stone-800">สูตรแป้ง:</b> ใช้แป้งมัน 300g ผสมแป้งท้าวยายม่อม 100g (คลุกเคล้าให้เป็นเนื้อเดียวกัน) แล้วแบ่งเป็น 2 กะละมัง (สำหรับสีขาวและสีม่วง)</li>
                          <li><b className="text-stone-800">การทำสีม่วงอัญชัน:</b> ใช้ดอกอัญชันแห้ง 10 ดอก แช่น้ำร้อน 1/2 ถ้วยตวง รอจนสีเข้ม กรองกากออก</li>
                          <li>นำน้ำอัญชันและน้ำเปล่า (สำหรับทำสีขาว) ใส่ขวดสเปรย์ หรือถ้วยเล็กๆ เตรียมไว้สำหรับพรม</li>
                        </ul>
                      </div>
                    </div>
                    <div className="flex items-start">
                      <span className="w-6 h-6 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center text-xs font-bold mr-3 shrink-0 mt-0.5 shadow-sm">3</span>
                      <div className="w-full">
                        <p className="font-bold text-stone-800 mb-1 border-b border-stone-100 pb-1">เทคนิค "พรม-คลุก-ร่อน" (เคล็ดลับความกลมสวย)</p>
                        <ol className="list-decimal pl-4 space-y-1.5 mt-2 text-stone-600 text-[13px]">
                          <li>นำกล้วยที่สะเด็ดน้ำแล้ว ลงคลุกแป้งแห้งรอบแรกให้ทั่ว</li>
                          <li><span className="text-amber-600 font-semibold">พรมน้ำ:</span> สเปรย์น้ำอัญชัน (หรือน้ำเปล่า) บางๆ ให้ทั่วตัวกล้วย (ห้ามเทพรวดเดียว เพราะจะกลายเป็นก้อนแป้งเปียก)</li>
                          <li>โรยแป้งทับลงไป แล้วใช้มือสองข้างจับกะละมัง "เขย่ากระดก" (Tossing) ให้แป้งกลิ้งไปเกาะกล้วย</li>
                          <li>ทำซ้ำขั้นตอน (พรมน้ำ → โรยแป้ง → เขย่า) ประมาณ <span className="font-semibold">3-4 รอบ</span> จนแป้งเคลือบหนาประมาณ 2 มม.</li>
                          <li><b>ข้อควรระวัง:</b> ต้องนำกล้วยที่คลุกเสร็จ ไป "ร่อนผ่านกระชอนตาห่าง" เพื่อเอาเศษผงแป้งส่วนเกินทิ้งไป (ถ้านำไปต้มทั้งผงแป้ง น้ำต้มจะเหนียวเป็นเมือกทันที)</li>
                        </ol>
                      </div>
                    </div>
                    <div className="flex items-start">
                      <span className="w-6 h-6 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center text-xs font-black mr-3 shrink-0 mt-0.5 shadow-sm">4</span>
                      <div className="w-full">
                        <p className="font-bold text-stone-800 mb-1 border-b border-stone-100 pb-1 flex items-center">

                        <ul className="list-disc pl-4 space-y-1.5 mt-2 text-stone-600 text-[13px]">
                          <li>ตั้งน้ำในหม้อให้ <span className="font-bold text-red-500">"เดือดจัด" (Rolling Boil)</span> ค่อยๆ เทกล้วยลงไป</li>
                          <li className="bg-red-50 text-red-800 p-2 rounded-lg font-semibold border border-red-100">ห้ามคนทันทีเด็ดขาด! ให้รอประมาณ 30 วินาที เพื่อให้แป้งเซตตัวรัดกล้วยก่อน ค่อยใช้กระชอนคนเบาๆ ไม่ให้ติดก้นหม้อ</li>
                          <li>ต้มไฟกลางค่อนแรง ประมาณ <span className="font-semibold">5-7 นาที</span> สังเกตว่าตัวแป้งจะสุกใสจนเห็นเนื้อกล้วยด้านใน และลอยขึ้นมาเหนือน้ำทั้งหมด</li>
                          <li>ใช้กระชอนตักขึ้น <span className="font-bold text-blue-600">น็อกในน้ำแข็งเย็นจัด 1 นาที</span> (ความเย็นเฉียบพลันจะทำให้แป้งรัดตัวและหนึบมาก)</li>
                          <li>ตักกล้วยออกจากน้ำเย็น สะเด็ดน้ำเตรียมนำไปหล่อในน้ำเชื่อม (ตามขั้นตอนที่ 5)</li>
                        </ul>
                      </div>
                    </div>
                    <div className="flex items-start">
                      <span className="w-6 h-6 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center text-xs font-black mr-3 shrink-0 mt-0.5 shadow-sm">5</span>
                      <div className="w-full">
                        <p className="font-bold text-stone-800 mb-1 border-b border-stone-100 pb-1">การทำน้ำเชื่อมมะพร้าวน้ำหอม (เคล็ดลับความหอมลึก)</p>
                        <ul className="list-disc pl-4 space-y-1 mt-2 text-stone-600 text-[13px]">
                          <li><b className="text-stone-800">การกรองสำคัญมาก:</b> นำน้ำมะพร้าวน้ำหอมแท้ <span className="font-semibold text-blue-600">500 ml</span> มากรองผ่าน <span className="font-bold text-red-500">ผ้าขาวบาง 2 ชั้น</span> เพื่อเอาเศษกะลาและใยมะพร้าวออกให้หมด (ถ้าน้ำไม่ใส กล้วยแก้วจะดูมัวและมีจุดดำเกาะ)</li>
                          <li><b className="text-stone-800">อัตราส่วนต้ม:</b> น้ำมะพร้าวที่กรองแล้ว + น้ำตาลทรายขาว <span className="font-semibold text-amber-600">1-2 ช้อนโต๊ะ</span> (ลดลงเพราะน้ำมะพร้าวมีความหวานธรรมชาติ) + ใบเตยแก่ <span className="font-semibold text-green-600">2-3 ใบ</span> (ขยำแล้วมัดปม)</li>

                        <div>
                          <p className="font-bold text-white text-sm mb-0.5">ถ้วยไอศกรีม (The Cold):</p>
                          <p className="leading-relaxed">ตักไอศกรีม 1 สกู๊ปใหญ่ แยกใส่ถ้วยกระดาษคราฟท์ 4oz (กระดาษช่วยกันความร้อน) ปิดฝาให้แน่น ห้ามใส่รวมกับถ้วยกล้วยอุ่นๆ เด็ดขาด!</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <div className="w-5 h-5 rounded-full bg-blue-700 text-white flex items-center justify-center text-[10px] font-bold mr-3 shrink-0 border border-blue-600">3</div>
                        <div>
                          <p className="font-bold text-white text-sm mb-0.5">กระปุกท็อปปิ้ง (The Crunch):</p>
                          <p className="leading-relaxed">ตักครัมเบิ้ล 1 ช้อนโต๊ะ ใส่กระปุกซอสใบจิ๋ว 1oz เพื่อรักษาความกรอบ 100% จนกว่าจะถึงมือลูกค้า</p>
                        </div>
                      </li>
                      <li className="flex items-start">
                        <div className="w-5 h-5 rounded-full bg-blue-700 text-white flex items-center justify-center text-[10px] font-bold mr-3 shrink-0 border border-blue-600">4</div>
                        <div>
                          <p className="font-bold text-yellow-400 text-sm mb-0.5">The Magic Touch (แพ็กลงถุง):</p>
                          <p className="leading-relaxed">นำถ้วยทั้ง 3 ใบ พร้อมช้อน ใส่ถุงกระดาษคราฟท์หูหิ้ว อย่าลืมใส่ <span className="font-semibold text-white">"การ์ดแนะนำวิธีทาน"</span> เพื่อสร้างความประทับใจให้ลูกค้าประกอบร่างเองที่บ้าน</p>
                        </div>
                      </li>
                    </ul>
                  </div>
                </div>

              </div>
            )}

          </div>

          {/* Bottom Navigation Bar */}
          <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-200 flex justify-between px-2 py-2 shadow-[0_-10px_30px_rgba(0,0,0,0.06)] z-20 pb-safe rounded-t-2xl">
            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center w-1/5 py-1.5 relative transition-all ${activeTab === 'dashboard' ? 'text-amber-600 scale-105' : 'text-stone-400 hover:text-amber-500'}`}>
              {activeTab === 'dashboard' && <span className="absolute -top-2 w-6 h-1 bg-amber-500 rounded-full"></span>}
              <i className={`text-[22px] mb-1 fa-solid fa-table-cells-large`}></i>
              <span className="text-[9px] font-bold tracking-wide">หน้าร้าน</span>
            </button>
            <button onClick={() => setActiveTab('ingredients')} className={`flex flex-col items-center w-1/5 py-1.5 relative transition-all ${activeTab === 'ingredients' ? 'text-amber-600 scale-105' : 'text-stone-400 hover:text-amber-500'}`}>
              {activeTab === 'ingredients' && <span className="absolute -top-2 w-6 h-1 bg-amber-500 rounded-full"></span>}
              <i className={`text-[22px] mb-1 fa-solid fa-utensils`}></i>
              <span className="text-[9px] font-bold tracking-wide">วัตถุดิบ</span>
            </button>
            <button onClick={() => setActiveTab('shopping')} className={`flex flex-col items-center w-1/5 py-1.5 relative transition-all ${activeTab === 'shopping' ? 'text-green-600 scale-105' : 'text-stone-400 hover:text-green-500'}`}>
               {activeTab === 'shopping' && <span className="absolute -top-2 w-6 h-1 bg-green-500 rounded-full"></span>}
              <i className={`text-[22px] mb-1 fa-solid fa-basket-shopping`}></i>
              <span className="text-[9px] font-bold tracking-wide">จ่ายตลาด</span>
            </button>
            <button onClick={() => setActiveTab('equipment')} className={`flex flex-col items-center w-1/5 py-1.5 relative transition-all ${activeTab === 'equipment' ? 'text-orange-500 scale-105' : 'text-stone-400 hover:text-orange-400'}`}>
               {activeTab === 'equipment' && <span className="absolute -top-2 w-6 h-1 bg-orange-500 rounded-full"></span>}
              <i className={`text-[22px] mb-1 fa-solid fa-store`}></i>
              <span className="text-[9px] font-bold tracking-wide">อุปกรณ์</span>
            </button>
            <button onClick={() => setActiveTab('recipe')} className={`flex flex-col items-center w-1/5 py-1.5 relative transition-all ${activeTab === 'recipe' ? 'text-amber-600 scale-105' : 'text-stone-400 hover:text-amber-500'}`}>
               {activeTab === 'recipe' && <span className="absolute -top-2 w-6 h-1 bg-amber-500 rounded-full"></span>}
              <i className={`text-[22px] mb-1 fa-solid fa-book-open`}></i>
              <span className="text-[9px] font-bold tracking-wide">สูตรลับ</span>
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
